apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- serviceaccount.yaml
- rbac.yaml
- manifests.yaml
- service.yaml
- secret.yaml
- deployment.yaml

# Namespace admission webhooks are intentionally not installed by default.
# Opt-in overlays must add namespace_webhooks.yaml and matching cert-rotation
# flags for the namespace webhook configuration names.

configurations:
- kustomizeconfig.yaml

# Add the component label to the auto-generated ValidatingWebhookConfiguration
# (manifests.yaml is generated by controller-gen and cannot carry custom labels).
# Use strategic merge patch to preserve existing labels while adding our own.
patches:
- target:
    kind: ValidatingWebhookConfiguration
    name: validating-webhook-configuration
  patch: |
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    metadata:
      name: validating-webhook-configuration
      labels:
        authorization.t-caas.telekom.com/component: "webhook"
