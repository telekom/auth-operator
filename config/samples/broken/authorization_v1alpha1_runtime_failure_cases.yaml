# =============================================================================
# Runtime Failure Samples (INTENTIONALLY STALL/ERROR DURING RECONCILIATION)
# =============================================================================
# IMPORTANT:
# - These objects are valid and should pass schema/webhook validation.
# - They are expected to fail during reconciliation due to runtime authz limits.
# - This file is intentionally NOT referenced by config/samples/kustomization.yaml.
# - It is included via config/samples/broken/kustomization.yaml and must apply
#   successfully in CI before surfacing stalled/partial reconciliation behavior.
# =============================================================================

---
# CASE: Impersonation enabled but expected authz failure.
# The impersonated ServiceAccount has no RBAC grants for target operations.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RBACPolicy
metadata:
  name: sample-policy-impersonation-authz-failure
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/policy-tier: samples
    t-caas.telekom.com/sample-case: impersonation-failure
spec:
  appliesTo:
    namespaces:
      - "*"
      - sample-tenant-a
  defaultAssignment:
    serviceAccounts:
      - name: sample-impersonation-denied
        namespace: sample-authz
  impersonation:
    enabled: true
    serviceAccountRef:
      name: sample-impersonation-denied
      namespace: sample-authz
  bindingLimits:
    allowClusterRoleBindings: true
    clusterRoleBindingLimits:
      allowedRoleRefs:
        - "sample-*"
    roleBindingLimits:
      allowedRoleRefs:
        - "sample-*"
  roleLimits:
    allowClusterRoles: true
  subjectLimits:
    allowedKinds:
      - ServiceAccount

---
# CASE: RestrictedBindDefinition expected to stall with forbidden errors.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedBindDefinition
metadata:
  name: rbd-case-impersonated-authz-failure
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: impersonated-failed
spec:
  policyRef:
    name: sample-policy-impersonation-authz-failure
  targetName: sample-impersonated-fail
  subjects:
    - kind: ServiceAccount
      name: sample-workload-impersonated-fail
      namespace: sample-tenant-a
      apiGroup: ""
  clusterRoleBindings:
    clusterRoleRefs:
      - sample-existing-cluster-role
  roleBindings:
    - namespace: sample-tenant-a
      roleRefs:
        - sample-existing-role

---
# CASE: RestrictedRoleDefinition expected to stall with forbidden errors.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedRoleDefinition
metadata:
  name: rrd-case-impersonated-authz-failure
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: impersonated-failed
spec:
  policyRef:
    name: sample-policy-impersonation-authz-failure
  targetRole: Role
  targetName: sample-impersonated-fail-role
  targetNamespace: sample-tenant-a
  scopeNamespaced: true
  restrictedVerbs:
    - delete

---
# CASE: RestrictedBindDefinition blocked by policy.
# The selected policy forbids ClusterRoleBindings, so reconciliation should
# mark a policy violation and deprovision/stall managed output.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedBindDefinition
metadata:
  name: rbd-case-blocked-crb-by-policy
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: blocked
spec:
  policyRef:
    name: sample-policy-block-clusterrolebindings
  targetName: sample-blocked-crb
  subjects:
    - kind: ServiceAccount
      name: sample-workload-blocked
      namespace: sample-tenant-a
      apiGroup: ""
  clusterRoleBindings:
    clusterRoleRefs:
      - sample-existing-cluster-role

---
# CASE: RestrictedBindDefinition with partially missing role references.
# Existing role refs may reconcile, but the missing role keeps the resource
# not Ready and exercises partial runtime behavior.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedBindDefinition
metadata:
  name: rbd-case-partial-missing-role-refs
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: partial
spec:
  policyRef:
    name: sample-policy-partially-allowed-bindings
  targetName: sample-partial-refs
  subjects:
    - kind: ServiceAccount
      name: sample-workload-partial
      namespace: sample-tenant-a
      apiGroup: ""
  roleBindings:
    - namespace: sample-tenant-a
      roleRefs:
        - sample-existing-role
        - sample-missing-role

---
# CASE: RestrictedBindDefinition blocked by forbidden subject kind.
# The policy allows ServiceAccount subjects only; this User subject should
# produce a policy violation.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedBindDefinition
metadata:
  name: rbd-case-blocked-subject-kind
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: blocked-subject
spec:
  policyRef:
    name: sample-policy-block-clusterrolebindings
  targetName: sample-blocked-subject-kind
  subjects:
    - kind: User
      name: sample-user-blocked
      apiGroup: rbac.authorization.k8s.io
  roleBindings:
    - namespace: sample-tenant-a
      roleRefs:
        - sample-existing-role

---
# CASE: RestrictedRoleDefinition blocked by policy.
# ClusterRole generation is valid schema input, but the selected policy forbids
# ClusterRoles and should report policy non-compliance.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedRoleDefinition
metadata:
  name: rrd-case-blocked-clusterrole-by-policy
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: blocked
spec:
  policyRef:
    name: sample-policy-block-clusterrolebindings
  targetRole: ClusterRole
  targetName: sample-clusterrole-blocked
  scopeNamespaced: false
  restrictedVerbs:
    - delete

---
# CASE: RestrictedRoleDefinition blocked by forbidden verb omission.
# The policy forbids "escalate" but this definition does not list it in
# restrictedVerbs, so reconciliation should surface a policy violation.
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedRoleDefinition
metadata:
  name: rrd-case-blocked-forbidden-verb-omission
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/sample-case: blocked-forbidden-verb
spec:
  policyRef:
    name: sample-policy-allow-all-paths
  targetRole: Role
  targetName: sample-blocked-forbidden-verb
  targetNamespace: sample-tenant-a
  scopeNamespaced: true
  restrictedVerbs:
    - delete
