# =============================================================================
# RestrictedRoleDefinition Samples - Comprehensive Feature Coverage
# =============================================================================
# Prerequisite: Apply authorization_v1alpha1_rbacpolicy.yaml first.
#
# These samples demonstrate all features of the RestrictedRoleDefinition CRD:
# - Policy reference (policyRef)
# - Namespaced Role generation within policy limits
# - ClusterRole generation (when allowed by policy)
# - Restricted APIs, resources, and verbs
# - Scoped to namespaced or cluster-scoped resources
# =============================================================================

---
# -----------------------------------------------------------------------------
# RestrictedRoleDefinition: Team Reader Role (Namespaced)
# Creates a read-only Role in a team namespace with restricted APIs.
# Use case: Team-scoped read access within policy guardrails
# Requires: team-workload-policy RBACPolicy
# -----------------------------------------------------------------------------
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedRoleDefinition
metadata:
  name: rrd-team-alpha-reader
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/tenant: team-alpha
spec:
  policyRef:
    name: team-workload-policy
  targetRole: Role
  targetName: t-caas-team-alpha-reader
  targetNamespace: team-alpha
  scopeNamespaced: true
  restrictedApis:
    - name: velero.io
      versions:
        - groupVersion: velero.io/v1
          version: v1
  restrictedResources:
    - name: secrets
      singularName: secret
      namespaced: true
      kind: Secret
      verbs:
        - all
  restrictedVerbs:
    - create
    - update
    - delete
    - patch

---
# -----------------------------------------------------------------------------
# RestrictedRoleDefinition: Operator ClusterRole
# Creates a ClusterRole for cross-namespace operator access.
# Use case: Operator with cross-namespace visibility
# Requires: operator-cross-namespace-policy RBACPolicy
# -----------------------------------------------------------------------------
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedRoleDefinition
metadata:
  name: rrd-operator-reader
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/tenant: platform-team
spec:
  policyRef:
    name: operator-cross-namespace-policy
  targetRole: ClusterRole
  targetName: t-caas-operator-reader
  scopeNamespaced: false
  restrictedApis:
    - name: certificates.k8s.io
      versions:
        - groupVersion: certificates.k8s.io/v1
          version: v1
  restrictedVerbs:
    - escalate
    - impersonate
    - bind

---
# -----------------------------------------------------------------------------
# RestrictedRoleDefinition: CI Deploy Role (Namespaced)
# Creates a deploy-scoped Role for CI/CD pipelines.
# Use case: CI/CD pipelines with minimal permissions
# Requires: cicd-pipeline-policy RBACPolicy
# -----------------------------------------------------------------------------
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: RestrictedRoleDefinition
metadata:
  name: rrd-ci-deploy-writer
  labels:
    app.kubernetes.io/name: auth-operator
    app.kubernetes.io/managed-by: kustomize
    t-caas.telekom.com/tenant: cicd
spec:
  policyRef:
    name: cicd-pipeline-policy
  targetRole: Role
  targetName: t-caas-ci-deploy-writer
  targetNamespace: cd-deploy
  scopeNamespaced: true
  restrictedApis:
    - name: admissionregistration.k8s.io
      versions:
        - groupVersion: admissionregistration.k8s.io/v1
          version: v1
  restrictedResources:
    - name: secrets
      singularName: secret
      namespaced: true
      kind: Secret
      verbs:
        - all
    - name: persistentvolumes
      singularName: persistentvolume
      namespaced: false
      kind: PersistentVolume
      verbs:
        - all
  restrictedVerbs:
    - delete
    - escalate
    - impersonate
    - bind
