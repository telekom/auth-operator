# =============================================================================
# Edge-Case Prerequisites
# =============================================================================
# Resources that must exist BEFORE the BindDefinition samples are applied.
# They simulate "pre-existing" cluster state that the operator must coexist with.
#
# Applied via: config/samples/kustomization.yaml (or kubectl apply -f during manual testing)
# =============================================================================

---
# Pre-existing ClusterRole — NOT managed by the operator.
# Referenced by bd-edge-preexisting-role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pre-existing-reader
  labels:
    t-caas.telekom.com/purpose: edge-case
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]

---
# Pre-existing ServiceAccount in tenant-alpha — NOT managed by the operator.
# Referenced as a subject by bd-edge-preexisting-sa.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pre-existing-sa
  namespace: tenant-alpha
  labels:
    t-caas.telekom.com/purpose: edge-case

---
# Pre-existing ServiceAccount in t-caas-monitoring — NOT managed by the operator.
# Referenced as a subject by BOTH bd-edge-shared-sa-consumer-a and
# bd-edge-shared-sa-consumer-b (shared SA, multiple consumers).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shared-monitoring-sa
  namespace: t-caas-monitoring
  labels:
    t-caas.telekom.com/purpose: edge-case

---
# Namespaces used by extended restricted sample scenarios.
apiVersion: v1
kind: Namespace
metadata:
  name: sample-authz
  labels:
    t-caas.telekom.com/purpose: sample-scenarios

---
apiVersion: v1
kind: Namespace
metadata:
  name: sample-tenant-a
  labels:
    t-caas.telekom.com/tenant: "true"
    t-caas.telekom.com/purpose: sample-scenarios

---
apiVersion: v1
kind: Namespace
metadata:
  name: sample-tenant-b
  labels:
    t-caas.telekom.com/tenant: "true"
    t-caas.telekom.com/purpose: sample-scenarios

---
# Existing RBAC objects used by "partially allowed" sample scenarios.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sample-existing-cluster-role
  labels:
    t-caas.telekom.com/purpose: sample-scenarios
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sample-existing-role
  namespace: sample-tenant-a
  labels:
    t-caas.telekom.com/purpose: sample-scenarios
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
# ServiceAccount used by impersonation-success policy/sample cases.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-impersonation-admin
  namespace: sample-authz
  labels:
    t-caas.telekom.com/purpose: sample-scenarios

---
# ServiceAccount intentionally left without RBAC grants for impersonation-failure
# sample cases (expected forbidden errors during apply).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-impersonation-denied
  namespace: sample-authz
  labels:
    t-caas.telekom.com/purpose: sample-scenarios

---
# RBAC grant for the impersonation-success ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sample-impersonation-rbac-manager
  labels:
    t-caas.telekom.com/purpose: sample-scenarios
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "roles", "clusterrolebindings", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sample-impersonation-admin-manager
  labels:
    t-caas.telekom.com/purpose: sample-scenarios
subjects:
  - kind: ServiceAccount
    name: sample-impersonation-admin
    namespace: sample-authz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sample-impersonation-rbac-manager

---
# ClusterRole fragments used by aggregateFrom RoleDefinition sample cases.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sample-aggregate-fragment-configmaps
  labels:
    t-caas.telekom.com/purpose: sample-scenarios
    t-caas.telekom.com/rbac-fragment: "true"
    t-caas.telekom.com/aggregate-scope: team
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sample-aggregate-fragment-pods
  labels:
    t-caas.telekom.com/purpose: sample-scenarios
    t-caas.telekom.com/rbac-fragment: "true"
    t-caas.telekom.com/aggregate-scope: team
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
