# This configuration is for teaching kustomize how to update name ref substitution
nameReference:
- kind: Issuer
  group: cert-manager.io
  fieldSpecs:
  - kind: Certificate
    group: cert-manager.io
    path: spec/issuerRef/name

# Instruct kustomize to prefix Certificate's secretName to match the prefixed Deployment volumes
namePrefix:
- kind: Certificate
  group: cert-manager.io
  fieldSpecs:
  - path: spec/secretName
