#
# Optional RBACPolicy impersonation grant.
# Add this file and impersonation_clusterrolebinding.yaml to config/rbac/kustomization.yaml
# only when RBACPolicy write access is restricted to platform administrators.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: impersonation-role
rules:
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - impersonate
