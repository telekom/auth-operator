{{- $caBundle := include "auth-operator.webhookCABundle" (dict "root" . "kind" "ValidatingWebhookConfiguration" "name" (printf "%s-binder-validating-webhook-configuration" (include "auth-operator.fullname" .))) | trim }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "auth-operator.fullname" . }}-binder-validating-webhook-configuration
  labels:
  {{- include "auth-operator.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    {{- if $caBundle }}
    caBundle: {{ $caBundle | quote }}
    {{- end }}
    service:
      name: '{{ include "auth-operator.fullname" . }}-webhook-service'
      namespace: '{{ .Release.Namespace }}'
      path: /validate-authorization-t-caas-telekom-com-v1alpha1-binddefinition
  failurePolicy: Fail
  name: binddefinition.validating.webhook.auth.t-caas.telekom.de
  rules:
  - apiGroups:
    - authorization.t-caas.telekom.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - binddefinitions
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    {{- if $caBundle }}
    caBundle: {{ $caBundle | quote }}
    {{- end }}
    service:
      name: '{{ include "auth-operator.fullname" . }}-webhook-service'
      namespace: '{{ .Release.Namespace }}'
      path: /validate-authorization-t-caas-telekom-com-v1alpha1-roledefinition
  failurePolicy: Fail
  name: roledefinition.validating.webhook.auth.t-caas.telekom.de
  rules:
  - apiGroups:
    - authorization.t-caas.telekom.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - roledefinitions
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    {{- if $caBundle }}
    caBundle: {{ $caBundle | quote }}
    {{- end }}
    service:
      name: '{{ include "auth-operator.fullname" . }}-webhook-service'
      namespace: '{{ .Release.Namespace }}'
      path: /validate-authorization-t-caas-telekom-com-v1alpha1-webhookauthorizer
  failurePolicy: Fail
  name: webhookauthorizer.validating.webhook.auth.t-caas.telekom.de
  rules:
  - apiGroups:
    - authorization.t-caas.telekom.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - webhookauthorizers
  sideEffects: None
