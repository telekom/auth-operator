{{- if and .Values.metrics.auth.enabled .Values.metrics.serviceMonitor.enabled .Values.metrics.serviceMonitor.scraperRBAC.create }}
{{- $serviceAccountName := required "metrics.serviceMonitor.scraperRBAC.serviceAccount.name is required when scraperRBAC.create=true" .Values.metrics.serviceMonitor.scraperRBAC.serviceAccount.name }}
{{- $serviceAccountNamespace := default .Release.Namespace .Values.metrics.serviceMonitor.scraperRBAC.serviceAccount.namespace }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "auth-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "auth-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "auth-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "auth-operator.fullname" . }}-metrics-reader
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $serviceAccountNamespace }}
{{- end }}
