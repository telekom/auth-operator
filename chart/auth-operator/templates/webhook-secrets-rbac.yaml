{{- /*
Namespaced Role restricting webhook server's secret access to the operator
namespace only. The cert-controller needs to read and update the TLS
certificate secret used by the admission webhooks.
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-secrets
  labels:
    app.kubernetes.io/component: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
rules:
  # Collection-level operations needed by the cert-controller informer/cache.
  # resourceNames cannot restrict list/watch (they are collection-level verbs).
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - list
  - watch
  # Instance-level access restricted to the webhook TLS certificate secret.
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ include "auth-operator.fullname" . }}-webhook-certs
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-secrets
  labels:
    app.kubernetes.io/component: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "auth-operator.fullname" . }}-webhook-secrets'
subjects:
- kind: ServiceAccount
  name: '{{ include "auth-operator.fullname" . }}-webhook-server'
  namespace: '{{ .Release.Namespace }}'
