{{- /*
Namespaced Role restricting webhook server's secret access to the operator
namespace only. The cert-controller needs to read and update the TLS
certificate secret used by the admission webhooks.
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-secrets
  labels:
    app.kubernetes.io/component: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ include "auth-operator.fullname" . }}-webhook-certs
  verbs:
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-secrets
  labels:
    app.kubernetes.io/component: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "auth-operator.fullname" . }}-webhook-secrets'
subjects:
- kind: ServiceAccount
  name: '{{ include "auth-operator.fullname" . }}-webhook-server'
  namespace: '{{ .Release.Namespace }}'
