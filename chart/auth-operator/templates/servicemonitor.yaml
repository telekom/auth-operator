{{- if .Values.metrics.serviceMonitor.enabled }}
{{- if not .Values.metrics.service.enabled }}
{{- fail "metrics.service.enabled must be true when metrics.serviceMonitor.enabled is true" }}
{{- end }}
{{- if and .Values.metrics.auth.enabled (not .Values.metrics.serviceMonitor.tlsConfig.insecureSkipVerify) (empty .Values.metrics.serviceMonitor.tlsConfig.caFile) }}
{{- fail "metrics.serviceMonitor.tlsConfig.caFile or metrics.serviceMonitor.tlsConfig.insecureSkipVerify=true is required when metrics.auth.enabled=true and metrics.serviceMonitor.enabled=true" }}
{{- end }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "auth-operator.fullname" . }}-controller-metrics
  labels:
    control-plane: controller-manager
  {{- include "auth-operator.labels" . | nindent 4 }}
  {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
    - path: /metrics
      port: metrics
      scheme: {{ if .Values.metrics.auth.enabled }}https{{ else }}http{{ end }}
      {{- with .Values.metrics.serviceMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- if .Values.metrics.auth.enabled }}
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      {{- with .Values.metrics.serviceMonitor.tlsConfig }}
      tlsConfig:
        {{- with .caFile }}
        caFile: {{ . | quote }}
        {{- end }}
        {{- with .serverName }}
        serverName: {{ . | quote }}
        {{- end }}
        {{- if hasKey . "insecureSkipVerify" }}
        insecureSkipVerify: {{ .insecureSkipVerify }}
        {{- end }}
      {{- end }}
      {{- end }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "auth-operator.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
