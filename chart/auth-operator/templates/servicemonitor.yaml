{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "auth-operator.fullname" . }}-controller-metrics
  labels:
    control-plane: controller-manager
  {{- include "auth-operator.labels" . | nindent 4 }}
  {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
    - path: /metrics
      port: metrics
      {{- /* When metrics.auth.enabled is true, the --metrics-secure flag is passed to the
           controller, which activates controller-runtime's built-in SecureServing. The
           metrics listener then uses a self-signed TLS certificate generated at startup;
           no external cert volume is required. insecureSkipVerify allows Prometheus to
           scrape that self-signed endpoint. */}}
      scheme: {{ if .Values.metrics.auth.enabled }}https{{ else }}http{{ end }}
      {{- with .Values.metrics.serviceMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- if .Values.metrics.auth.enabled }}
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        insecureSkipVerify: true
      {{- end }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "auth-operator.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
