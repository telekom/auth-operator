{{- if .Values.controller.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "auth-operator.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "auth-operator.labels" . | nindent 4 }}
spec:
  {{- $cMin := hasKey .Values.controller.podDisruptionBudget "minAvailable" }}
  {{- $cMax := hasKey .Values.controller.podDisruptionBudget "maxUnavailable" }}
  {{- if and $cMin $cMax }}
  {{- fail "podDisruptionBudget.minAvailable and podDisruptionBudget.maxUnavailable are mutually exclusive" }}
  {{- else if $cMin }}
  minAvailable: {{ .Values.controller.podDisruptionBudget.minAvailable }}
  {{- else if $cMax }}
  maxUnavailable: {{ .Values.controller.podDisruptionBudget.maxUnavailable }}
  {{- else }}
  minAvailable: 1
  {{- end }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "auth-operator.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if .Values.webhookServer.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-server
  labels:
    control-plane: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
spec:
  {{- $wMin := hasKey .Values.webhookServer.podDisruptionBudget "minAvailable" }}
  {{- $wMax := hasKey .Values.webhookServer.podDisruptionBudget "maxUnavailable" }}
  {{- if and $wMin $wMax }}
  {{- fail "podDisruptionBudget.minAvailable and podDisruptionBudget.maxUnavailable are mutually exclusive" }}
  {{- else if $wMin }}
  minAvailable: {{ .Values.webhookServer.podDisruptionBudget.minAvailable }}
  {{- else if $wMax }}
  maxUnavailable: {{ .Values.webhookServer.podDisruptionBudget.maxUnavailable }}
  {{- else }}
  minAvailable: 1
  {{- end }}
  selector:
    matchLabels:
      control-plane: webhook-server
    {{- include "auth-operator.selectorLabels" . | nindent 6 }}
{{- end }}
