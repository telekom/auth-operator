apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "auth-operator.fullname" . }}-controller-manager
  labels:
    app.kubernetes.io/component: controller-manager
  {{- include "auth-operator.labels" . | nindent 4 }}
rules:
# --- Namespace management (BindDefinition + RoleBindingTerminator) ---
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces/status
  verbs:
  - get
  - update
# --- ServiceAccount management (BindDefinition) ---
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# --- Event recording ---
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
  - update
# --- API discovery (RoleDefinition — needs broad read to discover all resources) ---
# NOTE: This broad read access is required by design. The RoleDefinition controller
# must discover all API resources to generate accurate ClusterRoles/Roles.
# The discovery API (/api, /apis) only lists resource types, not instances.
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
# --- CRD discovery ---
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
# --- CRD management ---
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions
  - roledefinitions
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions/finalizers
  - roledefinitions/finalizers
  verbs:
  - update
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions/status
  - roledefinitions/status
  - webhookauthorizers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - webhookauthorizers
  verbs:
  - get
  - list
  - watch
# --- RBAC management (RoleDefinition + BindDefinition) ---
# WARNING: The escalate and bind verbs are required for the operator to create
# ClusterRoles/Roles with arbitrary permissions and bind them to subjects.
# A compromised controller SA could escalate privileges. Mitigate by:
# - Restricting network access to the controller pod
# - Monitoring RBAC changes via audit logging
# - Using PodSecurityStandards to prevent container escape
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - rolebindings
  verbs:
  - create
  - delete
  - escalate
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - roles
  verbs:
  - bind
  - create
  - delete
  - escalate
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings/finalizers
  verbs:
  - update
---
# Webhook server ClusterRole — minimal permissions for admission webhooks
# and cert-controller TLS certificate rotation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-server
  labels:
    app.kubernetes.io/component: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
rules:
# --- Namespace reads (WebhookAuthorizer) ---
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# --- Webhook configuration management (cert-controller) ---
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
  - patch
  - update
  - watch
# --- CRD reads (admission validation) ---
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions/status
  - webhookauthorizers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - webhookauthorizers
  verbs:
  - get
  - list
  - watch
