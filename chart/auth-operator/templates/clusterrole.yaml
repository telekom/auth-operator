apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "auth-operator.fullname" . }}-controller-manager
  labels:
    app.kubernetes.io/component: controller-manager
  {{- include "auth-operator.labels" . | nindent 4 }}
rules:
# --- Namespace management (BindDefinition + RoleBindingTerminator) ---
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces/status
  verbs:
  - get
  - update
# --- ServiceAccount management (BindDefinition and RestrictedBindDefinition auto-create) ---
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - watch
{{- if and .Values.controller.impersonation.enabled .Values.controller.impersonation.clusterWide }}
# --- ServiceAccount impersonation (RBACPolicy) ---
# WARNING: serviceaccounts/impersonate lets the controller apply as any
# ServiceAccount. Keep this cluster-wide grant disabled unless RBACPolicy write
# access is restricted to platform administrators.
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - impersonate
{{- end }}
# --- Event recording ---
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
  - update
# --- Broad object reads (RoleDefinition and namespace-termination checks) ---
# NOTE: This grants get/list/watch on object metadata/specs across installed APIs.
# It supports dynamic RoleDefinition output and cleanup/status checks and is part
# of the controller deployment trust boundary.
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
# --- CRD discovery ---
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
# --- CRD management ---
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions
  - rbacpolicies
  - restrictedbinddefinitions
  - restrictedroledefinitions
  - roledefinitions
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions/finalizers
  - rbacpolicies/finalizers
  - restrictedbinddefinitions/finalizers
  - restrictedroledefinitions/finalizers
  - roledefinitions/finalizers
  verbs:
  - update
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions/status
  - rbacpolicies/status
  - restrictedbinddefinitions/status
  - restrictedroledefinitions/status
  - roledefinitions/status
  - webhookauthorizers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - webhookauthorizers
  verbs:
  - get
  - list
  - watch
# --- RBAC management (RoleDefinition + BindDefinition) ---
# WARNING: The bind/escalate verbs below are required for the operator to
# create ClusterRoles/Roles with arbitrary permissions and bind them to subjects.
# A compromised controller SA could escalate privileges. Mitigate by:
# - Restricting network access to the controller pod
# - Monitoring RBAC changes via audit logging
# - Using PodSecurityStandards to prevent container escape
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - rolebindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - roles
  verbs:
  - bind
  - create
  - delete
  - escalate
  - get
  - list
  - patch
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings/finalizers
  verbs:
  - update
---
# Webhook server ClusterRole — minimal permissions for admission webhooks
# and cert-controller TLS certificate rotation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "auth-operator.fullname" . }}-webhook-server
  labels:
    app.kubernetes.io/component: webhook-server
  {{- include "auth-operator.labels" . | nindent 4 }}
rules:
# --- Namespace reads (WebhookAuthorizer) ---
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# --- Webhook configuration management (cert-controller) ---
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingwebhookconfigurations
  verbs:
  - list
  - watch
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  resourceNames:
  - {{ include "auth-operator.fullname" . }}-namespace-mutating-webhook-configuration
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - validatingwebhookconfigurations
  resourceNames:
  - {{ include "auth-operator.fullname" . }}-namespace-validating-webhook-configuration
  - {{ include "auth-operator.fullname" . }}-binder-validating-webhook-configuration
  verbs:
  - get
  - patch
  - update
# --- CRD reads (admission validation) ---
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions
  - rbacpolicies
  - restrictedbinddefinitions
  - restrictedroledefinitions
  - roledefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - binddefinitions/status
  - rbacpolicies/status
  - restrictedbinddefinitions/status
  - restrictedroledefinitions/status
  - webhookauthorizers/status
  verbs:
  - get
- apiGroups:
  - authorization.t-caas.telekom.com
  resources:
  - webhookauthorizers
  verbs:
  - get
  - list
  - watch
# --- RBAC reads (BindDefinition webhook validates role reference existence) ---
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - roles
  verbs:
  - get
  - list
  - watch
