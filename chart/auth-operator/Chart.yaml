apiVersion: v2
name: auth-operator
description: A Kubernetes operator for managing Kubernetes RBAC with generated roles, bindings, webhook authorization, and policy-governed restricted RBAC APIs
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/telekom/auth-operator
sources:
  - https://github.com/telekom/auth-operator
maintainers:
  - name: Deutsche Telekom AG
    url: https://github.com/telekom
keywords:
  - kubernetes
  - operator
  - rbac
  - authorization
  - authentication
# icon: https://raw.githubusercontent.com/telekom/auth-operator/main/docs/images/logo.svg  # TODO: add logo
# OCI annotations for registry metadata (applied when pushing to OCI registry)
annotations:
  # OCI standard annotations
  org.opencontainers.image.title: auth-operator
  org.opencontainers.image.description: A Kubernetes operator for managing Kubernetes RBAC with generated roles, bindings, webhook authorization, and policy-governed restricted RBAC APIs
  org.opencontainers.image.url: https://github.com/telekom/auth-operator
  org.opencontainers.image.source: https://github.com/telekom/auth-operator
  org.opencontainers.image.vendor: Deutsche Telekom AG
  org.opencontainers.image.authors: Deutsche Telekom AG
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.documentation: https://github.com/telekom/auth-operator/blob/main/docs/operator-guide.md
  org.opencontainers.image.revision: ""  # Updated by CI with git commit SHA
  # Artifact Hub annotations (https://artifacthub.io/docs/topics/annotations/helm/)
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Seamless Upgrades
  artifacthub.io/license: Apache-2.0
  artifacthub.io/containsSecurityUpdates: "true"  # This release contains security hardening fixes
  artifacthub.io/prerelease: "false"  # Updated by CI for pre-release versions
  artifacthub.io/maintainers: |
    - name: Maximilian Rink (DTAG)
      email: maximilian.rink@telekom.de
  artifacthub.io/changes: |
    - kind: changed
      description: See release notes  # Updated by CI from GitHub release notes
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/telekom/auth-operator/blob/main/docs/operator-guide.md
    - name: API Reference
      url: https://github.com/telekom/auth-operator/blob/main/docs/api-reference/authorization.t-caas.telekom.com.md
  artifacthub.io/crds: |
    - kind: RoleDefinition
      version: v1alpha1
      name: roledefinitions.authorization.t-caas.telekom.com
      displayName: RoleDefinition
      description: Trusted-admin API that dynamically generates ClusterRoles/Roles based on API discovery
    - kind: BindDefinition
      version: v1alpha1
      name: binddefinitions.authorization.t-caas.telekom.com
      displayName: BindDefinition
      description: Trusted-admin API that creates ClusterRoleBindings/RoleBindings for subjects
    - kind: WebhookAuthorizer
      version: v1alpha1
      name: webhookauthorizers.authorization.t-caas.telekom.com
      displayName: WebhookAuthorizer
      description: Configures webhook-based authorization decisions
    - kind: RBACPolicy
      version: v1alpha1
      name: rbacpolicies.authorization.t-caas.telekom.com
      displayName: RBACPolicy
      description: Defines policy limits for RestrictedRoleDefinitions and RestrictedBindDefinitions
    - kind: RestrictedRoleDefinition
      version: v1alpha1
      name: restrictedroledefinitions.authorization.t-caas.telekom.com
      displayName: RestrictedRoleDefinition
      description: Generates bounded Roles or ClusterRoles under an RBACPolicy
    - kind: RestrictedBindDefinition
      version: v1alpha1
      name: restrictedbinddefinitions.authorization.t-caas.telekom.com
      displayName: RestrictedBindDefinition
      description: Creates bounded RoleBindings or ClusterRoleBindings under an RBACPolicy
  artifacthub.io/crdsExamples: |
    # Plain RoleDefinition and BindDefinition examples are for platform-admin
    # or trusted-admin authors. Use RBACPolicy with restricted CRDs for
    # delegated tenant workflows.
    - apiVersion: authorization.t-caas.telekom.com/v1alpha1
      kind: RoleDefinition
      metadata:
        name: example-role
      spec:
        targetRole: ClusterRole
        targetName: example-role
        scopeNamespaced: false
        restrictedVerbs: ["create", "update", "patch", "delete"]
    - apiVersion: authorization.t-caas.telekom.com/v1alpha1
      kind: BindDefinition
      metadata:
        name: example-binding
      spec:
        targetName: example-binding
        subjects:
          - kind: Group
            apiGroup: rbac.authorization.k8s.io
            name: developers
        clusterRoleBindings:
          clusterRoleRefs: ["example-role"]
    - apiVersion: authorization.t-caas.telekom.com/v1alpha1
      kind: RBACPolicy
      metadata:
        name: tenant-rbac-policy
      spec:
        appliesTo:
          namespaces: ["team-a"]
        roleLimits:
          allowClusterRoles: false
          forbiddenVerbs: ["impersonate", "escalate", "bind"]
        bindingLimits:
          allowClusterRoleBindings: false
          roleBindingLimits:
            allowedRoleRefs: ["tenant-*"]
        subjectLimits:
          allowedKinds: ["Group", "ServiceAccount"]
    - apiVersion: authorization.t-caas.telekom.com/v1alpha1
      kind: RestrictedRoleDefinition
      metadata:
        name: tenant-reader-role
      spec:
        policyRef:
          name: tenant-rbac-policy
        targetName: tenant-reader
        targetRole: Role
        targetNamespace: team-a
        scopeNamespaced: true
        restrictedVerbs: ["create", "update", "patch", "delete"]
    - apiVersion: authorization.t-caas.telekom.com/v1alpha1
      kind: RestrictedBindDefinition
      metadata:
        name: tenant-reader-binding
      spec:
        policyRef:
          name: tenant-rbac-policy
        targetName: tenant-reader
        subjects:
          - kind: Group
            apiGroup: rbac.authorization.k8s.io
            name: team-a-developers
        roleBindings:
          - namespace: team-a
            roleRefs: ["tenant-reader"]
  artifacthub.io/images: |
    - name: auth-operator
      image: ghcr.io/telekom/auth-operator:0.1.0
  # Note: We use cosign keyless signing instead of Helm's GPG provenance
  # Verify chart signatures with: cosign verify ghcr.io/telekom/charts/auth-operator:<version>
