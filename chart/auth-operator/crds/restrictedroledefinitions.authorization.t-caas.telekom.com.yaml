      type: string
    - description: Time since creation
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: Target RBAC object type
      jsonPath: .spec.targetRole
      name: Target
      type: string
    - description: Name of the generated role
      jsonPath: .spec.targetName
      name: Role name
      type: string
    - description: Whether the generated role covers namespaced resources
      jsonPath: .spec.scopeNamespaced
      name: Namespaced scope
      type: boolean
    - description: The referenced RBACPolicy
      jsonPath: .spec.policyRef.name
      name: PolicyRef
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RestrictedRoleDefinition is the Schema for the restrictedroledefinitions API.
          It is similar to RoleDefinition but requires a policy reference and enforces
          RBAC guardrails defined by the referenced RBACPolicy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RestrictedRoleDefinitionSpec defines the desired state of
              RestrictedRoleDefinition.
            properties:
              policyRef:
                description: PolicyRef references the RBACPolicy that governs this
                  role definition.
                properties:
                  name:
                    description: Name of the RBACPolicy.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              restrictedApis:
                description: RestrictedAPIs holds API groups which will NOT be included
                  in the generated role.
                items:
                  description: |-
                    APIGroup contains the name, the supported versions, and the preferred version
                    of a group.
                  properties:
                    apiVersion:
                      description: |-
                        APIVersion defines the versioned schema of this representation of an object.
                        Servers should convert recognized schemas to the latest internal value, and
                        may reject unrecognized values.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                      type: string
                    kind:
                      description: |-
                        Kind is a string value representing the REST resource this object represents.
                        Servers may infer this from the endpoint the client submits requests to.
                        Cannot be updated.
                        In CamelCase.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                      type: string
                    name:
                      description: name is the name of the group.
                      type: string
                    preferredVersion:
                      description: |-
                        preferredVersion is the version preferred by the API server, which
                        probably is the storage version.
                      properties:
                        groupVersion:
                          description: groupVersion specifies the API group and version
                            in the form "group/version"
                          type: string
                        version:
                          description: |-
                            version specifies the version in the form of "version". This is to save
                            the clients the trouble of splitting the GroupVersion.
                          type: string
                      required:
                      - groupVersion
                      - version
                      type: object
                    serverAddressByClientCIDRs:
                      description: |-
                        a map of client CIDR to server address that is serving this group.
                        This is to help clients reach servers in the most network-efficient way possible.
                        Clients can use the appropriate server address as per the CIDR that they match.
                        In case of multiple matches, clients should use the longest matching CIDR.
                        The server returns only those CIDRs that it thinks that the client can match.
                        For example: the master will return an internal IP CIDR only, if the client reaches the server using an internal IP.
                        Server looks at X-Forwarded-For header or X-Real-Ip header or request.RemoteAddr (in that order) to get the client IP.
                      items:
                        description: ServerAddressByClientCIDR helps the client to
                          determine the server address that they should use, depending
                          on the clientCIDR that they match.
                        properties:
                          clientCIDR:
                            description: The CIDR with which clients can match their
                              IP to figure out the server address that they should
                              use.
                            type: string
                          serverAddress:
                            description: |-
                              Address of this server, suitable for a client that matches the above CIDR.
                              This can be a hostname, hostname:port, IP or IP:port.
                            type: string
                        required:
                        - clientCIDR
                        - serverAddress
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                    versions:
                      description: versions are the versions supported in this group.
                      items:
                        description: |-
                          GroupVersion contains the "group/version" and "version" string of a version.
                          It is made a struct to keep extensibility.
                        properties:
                          groupVersion:
                            description: groupVersion specifies the API group and
                              version in the form "group/version"
                            type: string
                          version:
                            description: |-
                              version specifies the version in the form of "version". This is to save
                              the clients the trouble of splitting the GroupVersion.
                            type: string
                        required:
                        - groupVersion
                        - version
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                  required:
                  - name
                  - versions
                  type: object
                maxItems: 64
                type: array
              restrictedResources:
                description: RestrictedResources holds resources which will NOT be
                  included in the generated role.
                items:
                  description: APIResource specifies the name of a resource and whether
                    it is namespaced.
                  properties:
                    categories:
                      description: categories is a list of the grouped resources this
