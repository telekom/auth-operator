                  - name
                  - namespaced
                  - singularName
                  - verbs
                  type: object
                maxItems: 128
                type: array
              restrictedVerbs:
                description: RestrictedVerbs holds verbs which will NOT be included
                  in the generated role.
                items:
                  maxLength: 63
                  minLength: 1
                  pattern: ^([a-z]+|\*)$
                  type: string
                maxItems: 16
                type: array
              scopeNamespaced:
                description: |-
                  ScopeNamespaced controls whether the API resource filter includes
                  namespaced or cluster-scoped resources.
                type: boolean
              targetName:
                description: |-
                  TargetName is the name of the target role.
                  This field is immutable after creation.
                maxLength: 63
                minLength: 5
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              targetNamespace:
                description: |-
                  TargetNamespace is the target namespace for the Role.
                  Required when "TargetRole" is "Role".
                type: string
              targetRole:
                description: |-
                  TargetRole is the role type that will be reconciled: ClusterRole or Role.
                  This field is immutable after creation.
                enum:
                - ClusterRole
                - Role
                type: string
            required:
            - policyRef
            - scopeNamespaced
