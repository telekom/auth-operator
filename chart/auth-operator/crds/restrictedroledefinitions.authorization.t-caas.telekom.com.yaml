                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: atomic
                    group:
                      description: |-
                        group is the preferred group of the resource.  Empty implies the group of the containing resource list.
                        For subresources, this may have a different value, for example: Scale".
                      type: string
                    kind:
                      description: kind is the kind for the resource (e.g. 'Foo' is
                        the kind for a resource 'foo')
                      type: string
                    name:
                      description: name is the plural name of the resource.
                      type: string
                    namespaced:
                      description: namespaced indicates if a resource is namespaced
                        or not.
                      type: boolean
                    shortNames:
                      description: shortNames is a list of suggested short names of
                        the resource.
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: atomic
                    singularName:
                      description: |-
                        singularName is the singular name of the resource.  This allows clients to handle plural and singular opaquely.
                        The singularName is more correct for reporting status on a single item and both singular and plural are allowed
                        from the kubectl CLI interface.
                      type: string
                    storageVersionHash:
                      description: |-
                        The hash value of the storage version, the version this resource is
