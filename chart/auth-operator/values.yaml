image:
  repository: ghcr.io/telekom/auth-operator
  # Image reference precedence: digest > tag > Chart.AppVersion
  # - digest: immutable reference, preferred for production (e.g., sha256:<digest>)
  # - tag: mutable reference, useful for development
  # - If neither is set, defaults to Chart.AppVersion
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

# Global settings applied to all components
global:
  # Log verbosity level (0-9, higher is more verbose)
  logLevel: 2

serviceAccount:
  annotations: {}

# Node selection constraints (applied to all pods)
nodeSelector: {}

# Tolerations (applied to all pods)
tolerations: []

# Pod affinity rules (applied to all pods)
affinity: {}

# Pod topology spread constraints (applied to all pods)
topologySpreadConstraints: []

# Priority class name for pods
priorityClassName: ""

# Additional pod annotations (applied to all pods)
podAnnotations: {}

# Additional pod labels (applied to all pods)
podLabels: {}

controller:
  # Number of concurrent reconcilers for BindDefinition controller
  bindDefinitionConcurrency: 10
  # Number of concurrent reconcilers for RoleDefinition controller
  roleDefinitionConcurrency: 10
  # Number of concurrent reconcilers for WebhookAuthorizer controller (0 to disable)
  webhookAuthorizerConcurrency: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 128Mi
  replicas: 1
  # Seconds to wait for graceful shutdown before SIGKILL
  terminationGracePeriodSeconds: 35
  # Startup probe settings (tune for large clusters that need longer init)
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  podDisruptionBudget:
    # Enable PodDisruptionBudget for high availability
    enabled: false
    # Minimum number of pods that must be available during disruption
    minAvailable: 1
    # Maximum number of pods that can be unavailable during disruption
    # (mutually exclusive with minAvailable)
    # maxUnavailable: 1

webhookServer:
  # When replicas > 1, leader election is automatically enabled to prevent
  # concurrent cert rotation updates to the same Secret/WebhookConfiguration.
  replicas: 2
  tdgMigration: "false"
  # Maximum sustained requests per second for the /authorize endpoint.
  # Note: this limit is per pod. In HA deployments with multiple replicas,
  # the effective cluster-wide rate limit is (replicas × authorizeRateLimit).
  authorizeRateLimit: 100
  # Maximum burst size for the /authorize rate limiter.
  # Must be >= 1 when rate limiting is enabled.
  authorizeRateBurst: 200
  podDisruptionBudget:
    # Enable PodDisruptionBudget for high availability
    enabled: true
    # Minimum number of pods that must be available during disruption
    minAvailable: 1
    # Maximum number of pods that can be unavailable during disruption
    # (mutually exclusive with minAvailable)
    # maxUnavailable: 1
  resources:
    limits:
      cpu: 150m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  # Seconds to wait for graceful shutdown before SIGKILL
  terminationGracePeriodSeconds: 35
  # Startup probe settings (tune for large clusters that need longer init).
  # Non-leader replicas wait for the cert Secret volume mount, which may
  # take up to ~60s for kubelet sync; 120s window provides headroom.
  startupProbe:
    path: /healthz
    port: 8081
    failureThreshold: 60
    periodSeconds: 2
  # Pod affinity rules for webhook server (overrides global affinity).
  # Default spreads replicas across nodes for high availability.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                control-plane: webhook-server
            topologyKey: kubernetes.io/hostname
  service:
    port: 443
    protocol: TCP

metrics:
  # Require authentication and authorization for the /metrics endpoint.
  # When enabled, TokenReview and SubjectAccessReview protect the metrics endpoint
  # and auth-delegator ClusterRoleBinding is created.
  auth:
    enabled: true
  service:
    # Enable a dedicated Service for Prometheus scraping
    enabled: true
    port: 8080
  serviceMonitor:
    # Enable ServiceMonitor for Prometheus Operator
    enabled: false
    # Scrape interval (uses Prometheus default if empty)
    interval: ""
    # Scrape timeout (uses Prometheus default if empty)
    scrapeTimeout: ""
    # Additional labels for ServiceMonitor (e.g., for label-based selection)
    additionalLabels: {}

# Pod-level security context (applied to all pods)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context (applied to all containers)
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Network policies for restricting pod-level ingress
networkPolicy:
  # Enable NetworkPolicy resources for webhook and metrics port isolation
  enabled: false
  # Namespace that hosts the monitoring stack (Prometheus)
  # Used to restrict metrics port (8080) access on the controller-manager
  metricsNamespace: monitoring
  webhookServer:
    # Custom ingress `from` rules for the webhook port (9443).
    # By default, allows all namespaces (required for kube-apiserver on host network).
    # Override to restrict further if your CNI supports host-network policies.
    # Example:
    #   ingressFrom:
    #     - ipBlock:
    #         cidr: 10.0.0.0/8
    ingressFrom: []
  controllerManager:
    # Custom ingress `from` rules for the metrics port (8080).
    # By default, restricts to metricsNamespace only.
    # Override to allow additional namespaces.
    ingressFrom: []
  # Egress rules — required when a default-deny egress policy exists in the namespace.
  # When enabled, allows the operator pods to reach DNS, the Kubernetes API server,
  # and optionally webhook callback endpoints.
  egress:
    enabled: false
    # dnsNamespace is the namespace where CoreDNS runs (for UDP/TCP 53).
    dnsNamespace: kube-system
    # apiServerCIDR restricts egress to the API server by IP range.
    # WARNING: When empty, egress to ANY destination on ports 443/6443 is allowed,
    # which may undermine default-deny egress policies. Set this to your cluster's
    # API server CIDR for proper isolation.
    # Example: "10.96.0.1/32" for the default Kubernetes service IP.
    apiServerCIDR: ""
    # additionalRules allows injecting custom egress rules (e.g., webhook callbacks).
    # Each entry follows the standard NetworkPolicy egress rule schema.
    # Example:
    #   additionalRules:
    #     - ports:
    #         - port: 443
    #           protocol: TCP
    #       to:
    #         - namespaceSelector:
    #             matchLabels:
    #               kubernetes.io/metadata.name: cert-manager
    additionalRules: []

# OpenTelemetry tracing configuration
tracing:
  # Enable distributed tracing via OpenTelemetry
  enabled: false
  # OTLP collector endpoint (e.g. "otel-collector:4317")
  endpoint: ""
  # Trace sampling rate (0.0 to 1.0); 0.1 = 10% of traces
  samplingRate: 0.1
  # Use insecure (non-TLS) connection to the collector.
  # Set to true only for development; production should use TLS.
  insecure: false
