name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs when a new run is triggered for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load versions from versions.env
        run: |
          # Source versions.env as single source of truth
          grep -v '^#' versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env
        with:
          install-golangci-lint: 'true'
          golangci-lint-version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run golangci-lint
        run: golangci-lint run --timeout 10m

      - name: Run go vet
        run: go vet ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "ERROR: go.mod or go.sum is not tidy. Run 'go mod tidy' and commit changes."
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load versions from versions.env
        run: |
          # Source versions.env as single source of truth
          grep -v '^#' versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Install envtest
        run: |
          ENVTEST_K8S_VERSION="${ENVTEST_K8S_VERSION:-${KIND_K8S_VERSION#v}}"
          go install "sigs.k8s.io/controller-runtime/tools/setup-envtest@${ENVTEST_VERSION}"
          setup-envtest use "${ENVTEST_K8S_VERSION}" --bin-dir ./bin
          echo "Envtest binaries installed to: $(setup-envtest use "${ENVTEST_K8S_VERSION}" --bin-dir ./bin -p path)"

      - name: Run tests
        run: |
          ENVTEST_K8S_VERSION="${ENVTEST_K8S_VERSION:-${KIND_K8S_VERSION#v}}"
          ENVTEST_PATH="$(setup-envtest use "${ENVTEST_K8S_VERSION}" --bin-dir ./bin -p path)"
          # Convert to absolute path if relative
          if [[ "${ENVTEST_PATH}" != /* ]]; then
            ENVTEST_PATH="${GITHUB_WORKSPACE}/${ENVTEST_PATH}"
          fi
          export KUBEBUILDER_ASSETS="${ENVTEST_PATH}"

          if [ ! -x "${KUBEBUILDER_ASSETS}/etcd" ]; then
            echo "ERROR: envtest binaries not found at ${KUBEBUILDER_ASSETS}"
            ls -la "${KUBEBUILDER_ASSETS}/" 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi

          mapfile -t packages < <(go list ./... | grep -v /e2e)
          go test -race "${packages[@]}" -coverprofile=coverage.out -covermode=atomic
        env:
          CGO_ENABLED: "1"

      - name: Check coverage threshold
        run: |
          # Minimum coverage percentage (goal: 70%, see AGENTS.md)
          THRESHOLD=55

          set +o pipefail
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | sed 's/%//')
          set -o pipefail
          if [ -z "${TOTAL}" ]; then
            echo "FAIL: Could not parse coverage from coverage.out"
            exit 1
          fi
          echo "Total coverage: ${TOTAL}%  (threshold: ${THRESHOLD}%)"

          # Compare as integers (bash doesn't do float comparison)
          TOTAL_INT=${TOTAL%.*}
          if [ "${TOTAL_INT}" -lt "${THRESHOLD}" ]; then
            echo "FAIL: Coverage ${TOTAL}% is below the ${THRESHOLD}% threshold."
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Build binary
        run: go build -v -o bin/auth-operator ./main.go

      - name: Build Docker image
        uses: ./.github/actions/build-operator-image
        with:
          image-tag: 'test'

  verify-generated:
    name: Verify Generated Files
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Generate kubebuilder/controller-gen outputs
        run: |
          make manifests
          make generate

      - name: Verify kubebuilder/controller-gen outputs are committed
        run: |
          GENERATED_CHANGED=$(git diff --name-only | grep -E '^(config/crd/bases/|config/rbac/role\.yaml$|config/webhook/manifests\.yaml$|api/.+/zz_generated\.deepcopy\.go$|api/.+/applyconfiguration/)') || true
          if [ -n "${GENERATED_CHANGED}" ]; then
            echo "ERROR: kubebuilder/controller-gen outputs are out of date."
            echo "Run 'make manifests generate' and commit the generated changes."
            echo ""
            echo "Changed generated files:"
            echo "${GENERATED_CHANGED}"
            exit 1
          fi

      - name: Generate Helm chart and docs
        run: |
          make helm
          make docs

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "ERROR: Generated files are out of date. Run 'make manifests generate helm docs' and commit changes."
            echo ""
            echo "Changed files:"
            git diff --name-only
            exit 1
          fi
          if ! git diff --cached --exit-code; then
            echo "ERROR: There are staged changes after generation."
            exit 1
          fi

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load versions from versions.env
        run: grep -v '^#' versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint Helm chart
        run: make helm-lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # govulncheck runs in the dedicated security-scan.yml workflow — not duplicated here.

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        # This step may fail if org policy restricts security-events write permission
        # We continue on error to avoid blocking the workflow
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-fs-results.sarif'

  license-audit:
    name: Dependency License Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1

      - name: Check dependency licenses
        run: |
          go-licenses check ./... \
            --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,CC0-1.0,Unlicense

  verify-image-signature:
    name: Verify Release Image Signature
    runs-on: ubuntu-latest
    continue-on-error: true  # Informational — must not block CI if latest release is unsigned
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "tag_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag_found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        if: steps.tag.outputs.tag_found == 'true'
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: steps.tag.outputs.tag_found == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature
        if: steps.tag.outputs.tag_found == 'true'
        run: |
          # Image tags use semver without 'v' prefix (docker/metadata-action strips it)
          IMAGE_VERSION="${TAG#v}"
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_VERSION}"
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${TAG}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Verify SBOM attestation
        if: steps.tag.outputs.tag_found == 'true'
        run: |
          IMAGE_VERSION="${TAG#v}"
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_VERSION}"
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${TAG}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"
        env:
          TAG: ${{ steps.tag.outputs.tag }}
