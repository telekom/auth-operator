name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs when a new run is triggered for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions from versions.env
        run: |
          # Source versions.env as single source of truth
          grep -v '^#' versions.env | grep -v '^$' >> $GITHUB_ENV

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env
        with:
          install-golangci-lint: 'true'
          golangci-lint-version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run golangci-lint
        run: golangci-lint run --timeout 10m

      - name: Run go vet
        run: go vet ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "ERROR: go.mod or go.sum is not tidy. Run 'go mod tidy' and commit changes."
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions from versions.env
        run: |
          # Source versions.env as single source of truth
          grep -v '^#' versions.env | grep -v '^$' >> $GITHUB_ENV

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Install envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@${ENVTEST_VERSION}
          setup-envtest use 1.34.1 --bin-dir ./bin
          echo "Envtest binaries installed to: $(setup-envtest use 1.34.1 --bin-dir ./bin -p path)"

      - name: Run tests
        run: |
          ENVTEST_PATH="$(setup-envtest use 1.34.1 --bin-dir ./bin -p path)"
          # Convert to absolute path if relative
          if [[ "${ENVTEST_PATH}" != /* ]]; then
            ENVTEST_PATH="${GITHUB_WORKSPACE}/${ENVTEST_PATH}"
          fi
          export KUBEBUILDER_ASSETS="${ENVTEST_PATH}"

          if [ ! -x "${KUBEBUILDER_ASSETS}/etcd" ]; then
            echo "ERROR: envtest binaries not found at ${KUBEBUILDER_ASSETS}"
            ls -la "${KUBEBUILDER_ASSETS}/" 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi

          go test -race $(go list ./... | grep -v /e2e) -coverprofile=coverage.out -covermode=atomic
        env:
          CGO_ENABLED: "1"

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Build binary
        run: go build -v -o bin/auth-operator ./main.go

      - name: Build Docker image
        uses: ./.github/actions/build-operator-image
        with:
          image-tag: 'test'

  verify-generated:
    name: Verify Generated Files
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Generate kubebuilder/controller-gen outputs
        run: |
          make manifests
          make generate

      - name: Verify kubebuilder/controller-gen outputs are committed
        run: |
          GENERATED_CHANGED=$(git diff --name-only | grep -E '^(config/crd/bases/|config/rbac/role\.yaml$|config/webhook/manifests\.yaml$|api/.+/zz_generated\.deepcopy\.go$|api/.+/applyconfiguration/)') || true
          if [ -n "${GENERATED_CHANGED}" ]; then
            echo "ERROR: kubebuilder/controller-gen outputs are out of date."
            echo "Run 'make manifests generate' and commit the generated changes."
            echo ""
            echo "Changed generated files:"
            echo "${GENERATED_CHANGED}"
            exit 1
          fi

      - name: Generate Helm chart and docs
        run: |
          make helm
          make docs

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "ERROR: Generated files are out of date. Run 'make manifests generate helm docs' and commit changes."
            echo ""
            echo "Changed files:"
            git diff --name-only
            exit 1
          fi
          if ! git diff --cached --exit-code; then
            echo "ERROR: There are staged changes after generation."
            exit 1
          fi

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions from versions.env
        run: grep -v '^#' versions.env | grep -v '^$' >> $GITHUB_ENV

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint Helm chart
        run: helm lint chart/auth-operator --strict

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Run govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        # This step may fail if org policy restricts security-events write permission
        # We continue on error to avoid blocking the workflow
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-fs-results.sarif'

  license-audit:
    name: Dependency License Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1

      - name: Check dependency licenses
        run: |
          go-licenses check ./... \
            --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,CC0-1.0,Unlicense

  verify-image-signature:
    name: Verify Release Image Signature
    runs-on: ubuntu-latest
    continue-on-error: true  # Informational — must not block CI if latest release is unsigned
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "tag_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "tag_found=true" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        if: steps.tag.outputs.tag_found == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: steps.tag.outputs.tag_found == 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify image signature
        if: steps.tag.outputs.tag_found == 'true'
        run: |
          # Image tags use semver without 'v' prefix (docker/metadata-action strips it)
          IMAGE_VERSION="${TAG#v}"
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_VERSION}"
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${TAG}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Verify SBOM attestation
        if: steps.tag.outputs.tag_found == 'true'
        run: |
          IMAGE_VERSION="${TAG#v}"
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_VERSION}"
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${TAG}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"
        env:
          TAG: ${{ steps.tag.outputs.tag }}
