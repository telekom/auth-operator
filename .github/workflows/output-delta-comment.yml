name: Output Delta Comment

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: output-delta-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post Output Delta Comment
    runs-on: ubuntu-latest
    steps:
      # This pull_request_target workflow has write permissions so it can
      # comment on fork PRs. Do not checkout or execute pull-request code here.
      - name: Check output-delta applicability
        id: applicability
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          api_error="$(mktemp)"
          trap 'rm -f "$api_error"' EXIT

          if ! changed_files="$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename' 2>"$api_error")"; then
            cat "$api_error" >&2
            echo "::warning::Could not list PR files; assuming Output Delta is applicable so a fallback comment can still be posted."
            echo "is_applicable=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          is_output_delta_file() {
            case "$1" in
              .dockerignore|Dockerfile|Makefile|go.mod|go.sum|main.go|versions.env)
                return 0
                ;;
              api/*|cmd/*|config/*|hack/*|internal/*|pkg/*)
                return 0
                ;;
              chart/auth-operator/templates/*|chart/auth-operator/values.schema.json|chart/auth-operator/values.yaml)
                return 0
                ;;
              .github/actions/*|.github/workflows/output-delta.yml|.github/workflows/output-delta-comment.yml)
                return 0
                ;;
            esac
            return 1
          }

          is_applicable=false
          while IFS= read -r file; do
            if is_output_delta_file "$file"; then
              is_applicable=true
              break
            fi
          done <<< "$changed_files"

          echo "is_applicable=${is_applicable}" >> "$GITHUB_OUTPUT"

      - name: Wait for matching Output Delta run
        id: output-delta
        if: steps.applicability.outputs.is_applicable == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 5400))
          workflow_query_url="${GITHUB_SERVER_URL}/${GH_REPO}/actions/workflows/output-delta.yml?query=event%3Apull_request+head_sha%3A${HEAD_SHA}"
          api_error="$(mktemp)"
          trap 'rm -f "$api_error"' EXIT

          while true; do
            if ! run_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${GH_REPO}/actions/workflows/output-delta.yml/runs?event=pull_request&head_sha=${HEAD_SHA}&per_page=1" \
              --jq '.workflow_runs[0] // empty' 2>"$api_error")"; then
              cat "$api_error" >&2
              echo "::warning::Could not query Output Delta runs for ${HEAD_SHA}; retrying until timeout."
              run_json=
            fi
            : > "$api_error"

            if [ -n "$run_json" ]; then
              status="$(jq -r '.status // ""' <<< "$run_json")"
              conclusion="$(jq -r '.conclusion // ""' <<< "$run_json")"
              run_id="$(jq -r '.id // ""' <<< "$run_json")"
              run_url="$(jq -r '.html_url // ""' <<< "$run_json")"

              if [ "$status" = "completed" ]; then
                {
                  echo "run_found=true"
                  echo "run_id=${run_id}"
                  echo "run_url=${run_url}"
                  echo "conclusion=${conclusion}"
                } >> "$GITHUB_OUTPUT"
                exit 0
              fi

              echo "::notice::Output Delta run ${run_id} for ${HEAD_SHA} is ${status}; waiting."
            else
              echo "::notice::No Output Delta run found yet for ${HEAD_SHA}; waiting."
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::warning::Timed out waiting for Output Delta run for ${HEAD_SHA}; posting unknown-status comment."
              {
                echo "run_found=false"
                echo "run_id="
                echo "run_url=${workflow_query_url}"
                echo "conclusion=timed_out"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 30
          done

      - name: Check current PR head
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          api_error="$(mktemp)"
          trap 'rm -f "$api_error"' EXIT

          if ! current_head="$(gh pr view "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --json headRefOid \
            --jq '.headRefOid' 2>"$api_error")"; then
            cat "$api_error" >&2
            echo "::warning::Could not confirm current PR head; posting unknown-status comment."
            {
              echo "is_current=unknown"
              echo "current_head=unknown"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$current_head" != "$HEAD_SHA" ]; then
            echo "::notice::Posting stale output-delta comment for ${HEAD_SHA}; current PR head is ${current_head}."
            {
              echo "is_current=false"
              echo "current_head=${current_head}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "is_current=true"
            echo "current_head=${current_head}"
          } >> "$GITHUB_OUTPUT"

      - name: Download comment data
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          IS_APPLICABLE: ${{ steps.applicability.outputs.is_applicable }}
          IS_CURRENT: ${{ steps.current.outputs.is_current }}
          CURRENT_HEAD: ${{ steps.current.outputs.current_head }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_FOUND: ${{ steps.output-delta.outputs.run_found }}
          RUN_ID: ${{ steps.output-delta.outputs.run_id }}
          RUN_URL: ${{ steps.output-delta.outputs.run_url }}
          WORKFLOW_CONCLUSION: ${{ steps.output-delta.outputs.conclusion }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/output-delta-comment

          has_diff=unknown
          has_rbac_diff=false
          has_status_diff=false
          has_tag_diff=false
          pr_has_errors=false
          baseline_result=unknown
          candidate_result=unknown
          latest_tag=

          valid_bool() {
            case "$1" in
              true|false)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          valid_result() {
            case "$1" in
              success|failure|cancelled|skipped)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          read_status_data() {
            local status_file=/tmp/output-delta-comment/status.env
            if [ ! -s "$status_file" ]; then
              return 1
            fi

            while IFS='=' read -r key value; do
              case "$key" in
                has_diff)
                  case "$value" in
                    true|false|unknown)
                      has_diff="$value"
                      ;;
                  esac
                  ;;
                has_rbac_diff)
                  if valid_bool "$value"; then
                    has_rbac_diff="$value"
                  fi
                  ;;
                has_status_diff)
                  if valid_bool "$value"; then
                    has_status_diff="$value"
                  fi
                  ;;
                has_tag_diff)
                  if valid_bool "$value"; then
                    has_tag_diff="$value"
                  fi
                  ;;
                pr_has_errors)
                  if valid_bool "$value"; then
                    pr_has_errors="$value"
                  fi
                  ;;
                baseline_result)
                  if valid_result "$value"; then
                    baseline_result="$value"
                  fi
                  ;;
                candidate_result)
                  if valid_result "$value"; then
                    candidate_result="$value"
                  fi
                  ;;
                latest_tag)
                  if [[ "$value" =~ ^v[0-9A-Za-z._+-]+$ ]]; then
                    latest_tag="$value"
                  fi
                  ;;
              esac
            done < "$status_file"
          }

          write_diff_comment_bodies() {
            local diff_file=/tmp/output-delta-comment/diff-output/full-diff.txt
            local diff_dir=/tmp/output-delta-comment/diff-comments
            rm -rf "$diff_dir"
            mkdir -p "$diff_dir"

            write_placeholder_report_comment() {
              local message="$1"
              local detail="${2:-}"

              {
                echo "<!-- output-delta:part1 -->"
                echo "## :bar_chart: Output Delta Report"
                echo ""
                echo "$message"
                if [ -n "$detail" ]; then
                  echo "$detail"
                fi
                echo ""
                echo "No full diff content was generated for this run."
              } > "$diff_dir/part-0001.md"
            }

            if [ "$has_diff" != "true" ]; then
              if [ "$IS_CURRENT" = "false" ]; then
                write_placeholder_report_comment \
                  "Output differences were not computed for this stale workflow event." \
                  "The PR head moved from \`${HEAD_SHA}\` to \`${CURRENT_HEAD}\`; wait for the current-head Output Delta run."
              elif [ "$IS_CURRENT" = "unknown" ]; then
                write_placeholder_report_comment \
                  "Output differences could not be computed because the workflow could not confirm the current PR head." \
                  "Inspect the workflow logs before merging."
              elif [ "$IS_APPLICABLE" != "true" ]; then
                write_placeholder_report_comment \
                  "No output differences were detected for this PR." \
                  "No output-delta input files changed, so the Output Delta comparison workflow was not run."
              elif [ "$has_diff" = "false" ]; then
                write_placeholder_report_comment \
                  "No output differences were detected between trusted main baseline and this PR." \
                  "There is no diff to inspect for this run."
              else
                write_placeholder_report_comment \
                  "Output differences could not be computed for this run." \
                  "Inspect the workflow run and uploaded artifacts before merging."
              fi
              return 0
            fi
            if [ ! -s "$diff_file" ]; then
              echo "::warning::Output-delta diff artifact did not contain full-diff.txt; no inline diff comments generated."
              write_placeholder_report_comment \
                "Output differences were detected, but the inline full diff could not be generated." \
                "The downloaded output-delta-diff-output artifact did not contain full-diff.txt."
              return 0
            fi

            python3 - "$diff_file" "$diff_dir" <<'PY'
          import html
          import re
          import sys
          from pathlib import Path

          diff_file = Path(sys.argv[1])
          diff_dir = Path(sys.argv[2])
          text = diff_file.read_text(encoding="utf-8", errors="replace")

          # Keep enough headroom for markers, headings, code fences, and GitHub's
          # issue-comment size limit.
          max_comment_bytes = 55000
          max_body_bytes = 51000
          max_diff_bytes = 45500

          def fence_for(chunk: str) -> str:
              longest = max((len(match.group(0)) for match in re.finditer(r"`+", chunk)), default=0)
              return "`" * max(4, longest + 1)

          def split_unified_diffs(diff_text: str) -> list[str]:
              lines = diff_text.splitlines()
              sections = []
              start = None
              for index, line in enumerate(lines):
                  if line.startswith("--- ") and index + 1 < len(lines) and lines[index + 1].startswith("+++ "):
                      if start is not None:
                          sections.append("\n".join(lines[start:index]).rstrip("\n"))
                      start = index
              if start is not None:
                  sections.append("\n".join(lines[start:]).rstrip("\n"))
              if not sections and diff_text.strip():
                  sections.append(diff_text.rstrip("\n"))
              return [section for section in sections if section.strip()]

          def header_path(line: str) -> str:
              return line[4:].split("\t", 1)[0].strip() if len(line) > 4 else ""

          def resource_name(path: str) -> str:
              if path == "/dev/null":
                  return path
              match = re.search(r"/tmp/(?:main|tag|pr)-output/(.+)$", path)
              if match:
                  return match.group(1)
              return path.rsplit("/", 1)[-1] or path

          def comparison_for(left: str, right: str) -> str:
              if "/tmp/tag-output/" in left or "/tmp/tag-output/" in right:
                  return "Latest release tag -> PR"
              if "/tmp/main-output/" in left or "/tmp/main-output/" in right:
                  return "Trusted main baseline -> PR"
              return "Other output"

          def group_for(resource: str) -> str:
              stem = resource.rsplit("/", 1)[-1]
              if stem in {
                  "clusterroles.yaml",
                  "roles.yaml",
                  "clusterrolebindings.yaml",
                  "rolebindings.yaml",
                  "serviceaccounts.yaml",
              }:
                  return "RBAC resources"
              if stem in {
                  "roledefinitions-status.yaml",
                  "binddefinitions-status.yaml",
                  "rbacpolicies-status.yaml",
                  "restrictedbinddefinitions-status.yaml",
                  "restrictedroledefinitions-status.yaml",
                  "webhookauthorizers-status.yaml",
              }:
                  return "CR status"
              if stem == "metrics.txt":
                  return "Metrics"
              return "Other output"

          def stats_for(section: str) -> tuple[int, int, int]:
              additions = 0
              deletions = 0
              hunks = 0
              for line in section.splitlines():
                  if line.startswith("@@"):
                      hunks += 1
                  elif line.startswith("+") and not line.startswith("+++"):
                      additions += 1
                  elif line.startswith("-") and not line.startswith("---"):
                      deletions += 1
              return additions, deletions, hunks

          def split_bytes(value: str, limit: int) -> list[str]:
              encoded = value.encode("utf-8")
              chunks = [
                  encoded[index:index + limit].decode("utf-8", errors="replace")
                  for index in range(0, len(encoded), limit)
              ]
              return chunks or [""]

          def details_block(item: dict[str, object]) -> str:
              label = html.escape(str(item["resource"]))
              additions = int(item["additions"])
              deletions = int(item["deletions"])
              hunks = int(item["hunks"])
              chunk_label = ""
              if int(item["chunk_total"]) > 1:
                  chunk_label = f" chunk {item['chunk_index']}/{item['chunk_total']}"
              hunk_label = "hunk" if hunks == 1 else "hunks"
              summary = f"<code>{label}</code>{chunk_label} (+{additions}/-{deletions}, {hunks} {hunk_label})"
              chunk = str(item["chunk"]).rstrip("\n")
              fence = fence_for(chunk)
              return "\n".join([
                  "<details>",
                  f"<summary>{summary}</summary>",
                  "",
                  fence + "diff",
                  chunk,
                  fence,
                  "",
                  "</details>",
                  "",
                  "",
              ])

          sections = split_unified_diffs(text)
          items = []
          for section in sections:
              lines = section.splitlines()
              left = header_path(lines[0]) if len(lines) >= 1 and lines[0].startswith("--- ") else ""
              right = header_path(lines[1]) if len(lines) >= 2 and lines[1].startswith("+++ ") else ""
              resource = resource_name(right if right != "/dev/null" else left)
              additions, deletions, hunks = stats_for(section)
              pieces = split_bytes(section, max_diff_bytes)
              for chunk_index, chunk in enumerate(pieces, start=1):
                  items.append({
                      "comparison": comparison_for(left, right),
                      "group": group_for(resource),
                      "resource": resource,
                      "additions": additions,
                      "deletions": deletions,
                      "hunks": hunks,
                      "chunk": chunk,
                      "chunk_index": chunk_index,
                      "chunk_total": len(pieces),
                  })

          if not items:
              items.append({
                  "comparison": "Other output",
                  "group": "Other output",
                  "resource": "full-diff.txt",
                  "additions": 0,
                  "deletions": 0,
                  "hunks": 0,
                  "chunk": text.rstrip("\n"),
                  "chunk_index": 1,
                  "chunk_total": 1,
              })

          parts: list[str] = []
          current: list[str] = []
          current_bytes = 0
          current_comparison = None
          current_group = None

          def encoded_len(value: str) -> int:
              return len(value.encode("utf-8"))

          def flush() -> None:
              global current, current_bytes, current_comparison, current_group
              if current:
                  parts.append("".join(current).rstrip("\n") + "\n")
              current = []
              current_bytes = 0
              current_comparison = None
              current_group = None

          def ensure_context(comparison: str, group: str) -> str:
              context = []
              global current_comparison, current_group
              if current_comparison != comparison:
                  context.append(f"### {comparison}\n\n")
                  current_comparison = comparison
                  current_group = None
              if current_group != group:
                  context.append(f"#### {group}\n\n")
                  current_group = group
              return "".join(context)

          for item in items:
              comparison = str(item["comparison"])
              group = str(item["group"])
              block = details_block(item)
              context = ensure_context(comparison, group)
              addition = context + block
              if current and current_bytes + encoded_len(addition) > max_body_bytes:
                  current_comparison = None
                  current_group = None
                  context = ensure_context(comparison, group)
                  addition = context + block
                  flush()
                  context = ensure_context(comparison, group)
                  addition = context + block
              current.append(addition)
              current_bytes += encoded_len(addition)
          flush()

          total = max(1, len(parts))
          digits = max(4, len(str(total)))
          for index, part in enumerate(parts, start=1):
              heading = "## :bar_chart: Output Delta Report"
              if index > 1:
                  heading = "## :bar_chart: Output Delta Report (cont.)"
              header = "\n".join([
                  f"<!-- output-delta:part{index} -->",
                  heading,
                  "",
                  f"Full output diff from `output-delta-diff-output` ({index}/{total}).",
                  "Sections are grouped by comparison and resource type. File diffs are collapsed by default.",
                  "",
                  "",
              ])
              body = header + part
              if encoded_len(body) > max_comment_bytes:
                  raise SystemExit(f"Generated output-delta comment part {index} is too large")
              (diff_dir / f"part-{index:0{digits}d}.md").write_text(body, encoding="utf-8")
          PY
          }

          write_comment_body() {
            local workflow_conclusion="${WORKFLOW_CONCLUSION:-unknown}"
            local workflow_run="${RUN_URL:-}"
            local baseline_display="${baseline_result}"
            local candidate_display="${candidate_result}"
            local diff_display="${has_diff}"
            local rbac_diff_display="${has_rbac_diff}"
            local status_diff_display="${has_status_diff}"
            local pr_errors_display="${pr_has_errors}"
            local tag_diff_display="${has_tag_diff}"
            local diff_comment_count=0
            if [ -d /tmp/output-delta-comment/diff-comments ]; then
              diff_comment_count="$(find /tmp/output-delta-comment/diff-comments -type f -name 'part-*.md' | wc -l | tr -d '[:space:]')"
            fi
            if [ "$IS_CURRENT" = "false" ]; then
              workflow_conclusion=stale_head
              baseline_display=skipped
              candidate_display=skipped
              diff_display=unknown
              rbac_diff_display=false
              status_diff_display=false
              pr_errors_display=false
              tag_diff_display=false
            elif [ "$IS_CURRENT" = "unknown" ]; then
              workflow_conclusion=current_head_unknown
              baseline_display=unknown
              candidate_display=unknown
              diff_display=unknown
              rbac_diff_display=false
              status_diff_display=false
              pr_errors_display=false
              tag_diff_display=false
            elif [ "$IS_APPLICABLE" != "true" ]; then
              workflow_conclusion=skipped
              workflow_run=not_applicable
              baseline_display=skipped
              candidate_display=skipped
              diff_display=false
              rbac_diff_display=false
              status_diff_display=false
              pr_errors_display=false
              tag_diff_display=false
            fi

            {
              echo "<!-- auth-operator-output-delta-comment -->"
              echo "## Output Delta"
              echo ""
              if [ "$IS_CURRENT" = "false" ]; then
                echo "Output differences were not computed for this workflow event because it is stale."
                echo "The PR head moved from \`${HEAD_SHA}\` to \`${CURRENT_HEAD}\`; wait for the current-head Output Delta run."
              elif [ "$IS_CURRENT" = "unknown" ]; then
                echo "Output differences could not be computed because the workflow could not confirm the current PR head."
                echo "No diff is available for this run; inspect the workflow logs before merging."
              elif [ "$IS_APPLICABLE" != "true" ]; then
                echo "No output differences were detected for this PR."
                echo "No output-delta input files changed."
                echo "There is no diff to inspect for this run."
              else
                case "$has_diff" in
                  true)
                    if [ "$diff_comment_count" -gt 0 ]; then
                      echo "Output differences were detected. The full diff is posted below in ${diff_comment_count} bot comment(s)."
                    else
                      echo "Output differences were detected, but the inline diff could not be generated. Inspect the \`output-delta-diff-output\` artifact before merging."
                    fi
                    ;;
                  false)
                    echo "No output differences were detected between trusted main baseline and this PR. There is no diff to inspect for this run."
                    ;;
                  *)
                    echo "Output differences could not be computed. No diff is available for this run; inspect the workflow run and uploaded artifacts before merging."
                    ;;
                esac
              fi
              echo ""
              echo "- Trusted baseline job: ${baseline_display}"
              echo "- Candidate PR job: ${candidate_display}"
              echo "- Differences detected: ${diff_display}"
              echo "- RBAC differences detected: ${rbac_diff_display}"
              echo "- CRD status differences detected: ${status_diff_display}"
              echo "- Candidate log errors detected: ${pr_errors_display}"
              echo "- Latest tag diff generated: ${tag_diff_display}"
              if [ -n "$latest_tag" ]; then
                echo "- Latest release tag compared: ${latest_tag}"
              fi
              echo "- Workflow conclusion: ${workflow_conclusion}"
              echo "- Workflow run: ${workflow_run:-unknown}"
              echo ""
              echo "The compare job downloads artifacts only; it does not checkout or execute pull-request code."
            } > /tmp/output-delta-comment/body.md
          }

          if [ "$IS_CURRENT" = "false" ]; then
            echo "::notice::Posting stale-head comment."
          elif [ "$IS_CURRENT" = "unknown" ]; then
            echo "::warning::Posting current-head-unknown comment."
          elif [ "$IS_APPLICABLE" != "true" ]; then
            has_diff=false
            echo "::notice::Posting no-diff comment; no inputs changed."
          elif [ "$RUN_FOUND" = "true" ] && [ -n "$RUN_ID" ]; then
            if ! gh run download "$RUN_ID" \
              --repo "$GH_REPO" \
              --name output-delta-comment-data \
              --dir /tmp/output-delta-comment; then
              echo "::warning::Output-delta comment artifact is missing; posting unknown-status comment."
            fi
          else
            echo "::warning::No completed Output Delta run was found; posting unknown-status comment."
          fi

          if [ "$IS_CURRENT" = "true" ] && [ "$IS_APPLICABLE" = "true" ] && ! read_status_data; then
            echo "::warning::Output-delta comment artifact did not contain status.env; posting unknown-status comment."
          fi

          if [ "$IS_CURRENT" = "true" ] && [ "$IS_APPLICABLE" = "true" ] && [ "$RUN_FOUND" = "true" ] && [ -n "$RUN_ID" ] && [ "$has_diff" = "true" ]; then
            if ! gh run download "$RUN_ID" \
              --repo "$GH_REPO" \
              --name output-delta-diff-output \
              --dir /tmp/output-delta-comment/diff-output; then
              echo "::warning::Output-delta diff artifact is missing; no inline diff comments generated."
            fi
          fi

          write_diff_comment_bodies
          write_comment_body

      - name: Create or update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          body_file=/tmp/output-delta-comment/body.md
          marker="<!-- auth-operator-output-delta-comment -->"
          if ! grep -Fq "$marker" "$body_file"; then
            echo "::error::Output-delta comment body is missing the update marker."
            exit 1
          fi

          jq -n --rawfile body "$body_file" '{body: $body}' > /tmp/output-delta-comment/comment.json
          comment_id="$(gh api --paginate "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- auth-operator-output-delta-comment -->")) | .id' \
            | tail -n 1)"

          if [ -n "$comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${GH_REPO}/issues/comments/${comment_id}" \
              --input /tmp/output-delta-comment/comment.json >/dev/null
            echo "Updated output-delta comment on PR #${PR_NUMBER}."
          else
            gh api \
              --method POST \
              "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
              --input /tmp/output-delta-comment/comment.json >/dev/null
            echo "Created output-delta comment on PR #${PR_NUMBER}."
          fi

          shopt -s nullglob
          diff_dir=/tmp/output-delta-comment/diff-comments
          mapfile -t diff_comment_ids < <(gh api --paginate "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- output-delta:part")) | .id')
          diff_comment_files=("$diff_dir"/part-*.md)

          for index in "${!diff_comment_files[@]}"; do
            jq -n --rawfile body "${diff_comment_files[$index]}" '{body: $body}' > /tmp/output-delta-comment/diff-comment.json
            if [ "$index" -lt "${#diff_comment_ids[@]}" ]; then
              gh api \
                --method PATCH \
                "repos/${GH_REPO}/issues/comments/${diff_comment_ids[$index]}" \
                --input /tmp/output-delta-comment/diff-comment.json >/dev/null
              echo "Updated output-delta full-diff comment $((index + 1)) on PR #${PR_NUMBER}."
            else
              gh api \
                --method POST \
                "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
                --input /tmp/output-delta-comment/diff-comment.json >/dev/null
              echo "Created output-delta full-diff comment $((index + 1)) on PR #${PR_NUMBER}."
            fi
          done

          for ((index=${#diff_comment_files[@]}; index<${#diff_comment_ids[@]}; index++)); do
            gh api \
              --method DELETE \
              "repos/${GH_REPO}/issues/comments/${diff_comment_ids[$index]}" >/dev/null
            echo "Deleted stale output-delta full-diff comment $((index + 1)) on PR #${PR_NUMBER}."
          done
