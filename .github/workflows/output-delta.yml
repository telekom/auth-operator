name: Output Delta

on:
  pull_request:
    branches: [main]
    paths:
      - '.dockerignore'
      - 'Dockerfile'
      - 'Makefile'
      - 'api/**'
      - 'cmd/**'
      - 'chart/auth-operator/templates/**'
      - 'chart/auth-operator/values.schema.json'
      - 'chart/auth-operator/values.yaml'
      - 'config/**'
      - 'hack/**'
      - 'internal/**'
      - 'pkg/**'
      - '.github/actions/**'
      - '.github/workflows/output-delta.yml'
      - '.github/workflows/output-delta-comment.yml'
      - 'go.mod'
      - 'go.sum'
      - 'main.go'
      - 'versions.env'
  workflow_dispatch:

permissions:
  contents: read

env:
  BASELINE_CLUSTER: output-delta-baseline
  CANDIDATE_CLUSTER: output-delta-pr

jobs:
  trusted-baseline:
    name: Trusted Baseline Outputs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      latest_tag: ${{ steps.latest-tag.outputs.tag }}
      tag_success: ${{ steps.tag-output.outputs.tag_success }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: main-branch
          fetch-depth: 0
          persist-credentials: false

      - name: Load trusted tool versions
        run: |
          set -euo pipefail
          yq_version=""
          yq_linux_amd64_sha256=""
          while IFS='=' read -r key value; do
            case "${key}" in
              KIND_VERSION)
                if [[ ! "${value}" =~ ^v[0-9A-Za-z._+-]+$ ]]; then
                  echo "Invalid ${key}: ${value}" >&2
                  exit 1
                fi
                echo "${key}=${value}" >> "$GITHUB_ENV"
                ;;
              YQ_VERSION)
                if [[ ! "${value}" =~ ^v[0-9A-Za-z._+-]+$ ]]; then
                  echo "Invalid ${key}: ${value}" >&2
                  exit 1
                fi
                yq_version="${value}"
                ;;
              YQ_LINUX_AMD64_SHA256)
                if [[ ! "${value}" =~ ^[0-9a-f]{64}$ ]]; then
                  echo "Invalid ${key}: ${value}" >&2
                  exit 1
                fi
                yq_linux_amd64_sha256="${value}"
                ;;
            esac
          done < <(grep -Ev '^(#|$)' main-branch/versions.env)

          if [ -z "$yq_version" ] && [ -z "$yq_linux_amd64_sha256" ]; then
            yq_version="v4.53.3"
            yq_linux_amd64_sha256="fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4"
            echo "::notice::main versions.env does not define yq; using pinned bootstrap ${yq_version}"
          elif [ -z "$yq_version" ] || [ -z "$yq_linux_amd64_sha256" ]; then
            echo "main versions.env must define both YQ_VERSION and YQ_LINUX_AMD64_SHA256" >&2
            exit 1
          fi

          echo "YQ_VERSION=${yq_version}" >> "$GITHUB_ENV"
          echo "YQ_LINUX_AMD64_SHA256=${yq_linux_amd64_sha256}" >> "$GITHUB_ENV"

      - name: Setup Go Environment
        uses: ./main-branch/.github/actions/setup-go-env
        with:
          go-version-file: main-branch/go.mod
          install-kind: 'true'
          kind-version: ${{ env.KIND_VERSION }}
          cache-dependency-path: main-branch/go.sum

      - name: Install yq
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /tmp/yq
          echo "${YQ_LINUX_AMD64_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

      - name: Create kind cluster
        run: |
          kind create cluster --name "${BASELINE_CLUSTER}" --wait 5m
          kubectl cluster-info

      - name: Install popular CRDs
        run: KIND_CLUSTER_NAME="${BASELINE_CLUSTER}" bash main-branch/hack/ci/setup-kind-crds.sh

      - name: Create test namespaces
        run: bash main-branch/hack/ci/create-test-namespaces.sh

      - name: Create trusted sample apply helper
        run: |
          set -euo pipefail
          cat > /tmp/apply-output-delta-samples.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          sample_dir="${1:?Usage: apply-output-delta-samples.sh <sample-dir>}"
          if [ ! -d "$sample_dir" ]; then
            echo "::error::Sample directory not found: $sample_dir"
            exit 1
          fi

          render_samples() {
            local out="$1"
            if ! kubectl kustomize "$sample_dir" > "$out"; then
              echo "::error::Failed to render sample kustomization: $sample_dir"
              exit 1
            fi
          }

          apply_yaml() {
            local label="$1"
            local file="$2"
            shift 2

            if ! grep -q '^kind:' "$file"; then
              echo "No $label documents to apply"
              return 0
            fi

            for i in 1 2 3 4 5; do
              if kubectl apply --server-side --force-conflicts "$@" -f "$file"; then
                echo "Applied $label"
                return 0
              fi
              echo "$label apply attempt $i failed, waiting before retry..."
              sleep 10
            done

            echo "::error::$label failed to apply after 5 attempts"
            return 1
          }

          ensure_requester_rbac() {
            kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: auth-operator-output-delta-sample-requester
          rules:
            - apiGroups: ["authorization.t-caas.telekom.com"]
              resources:
                - restrictedbinddefinitions
                - restrictedroledefinitions
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: auth-operator-output-delta-sample-requester
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: auth-operator-output-delta-sample-requester
          subjects:
            - kind: ServiceAccount
              name: ci-rbac-applier
              namespace: ci-runners
            - kind: ServiceAccount
              name: team-alpha-rbac-applier
              namespace: team-alpha
            - kind: ServiceAccount
              name: sample-impersonation-denied
              namespace: sample-authz
            - kind: User
              name: output-delta-platform-operator
            - kind: User
              name: output-delta-sample-admin
            - kind: User
              name: output-delta-unassigned
          EOF
          }

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          rendered="$tmp/rendered.yaml"
          render_samples "$rendered"

          yq -o=yaml 'select(.kind != "RestrictedBindDefinition" and .kind != "RestrictedRoleDefinition")' "$rendered" > "$tmp/base.yaml"
          apply_yaml "non-restricted samples from $sample_dir" "$tmp/base.yaml"

          ensure_requester_rbac

          assert_known_policy_refs() {
            local policy
            while IFS= read -r policy; do
              [ -n "$policy" ] || continue
              case "$policy" in
                team-workload-policy|operator-cross-namespace-policy|cicd-pipeline-policy|sample-policy-allow-all-paths|sample-policy-impersonation-authz-failure|sample-policy-block-clusterrolebindings|sample-policy-partially-allowed-bindings)
                  ;;
                *)
                  echo "::error::Restricted sample policyRef $policy has no output-delta requester mapping"
                  exit 1
                  ;;
              esac
            done < <(yq -r --no-doc 'select(.kind == "RestrictedBindDefinition" or .kind == "RestrictedRoleDefinition") | .spec.policyRef.name // ""' "$rendered" | sort -u)
          }

          apply_policy_docs() {
            local policy="$1"
            shift
            local out="$tmp/${policy}.yaml"
            POLICY="$policy" yq -o=yaml 'select((.kind == "RestrictedBindDefinition" or .kind == "RestrictedRoleDefinition") and .spec.policyRef.name == strenv(POLICY))' "$rendered" > "$out"
            apply_yaml "restricted samples for policy $policy" "$out" "$@"
          }

          assert_known_policy_refs

          apply_policy_docs team-workload-policy \
            --as=system:serviceaccount:team-alpha:team-alpha-rbac-applier
          apply_policy_docs operator-cross-namespace-policy \
            --as=output-delta-platform-operator \
            --as-group=oidc:platform-operators
          apply_policy_docs cicd-pipeline-policy \
            --as=system:serviceaccount:ci-runners:ci-rbac-applier
          apply_policy_docs sample-policy-allow-all-paths \
            --as=output-delta-sample-admin \
            --as-group=oidc:sample-rbac-admins
          apply_policy_docs sample-policy-impersonation-authz-failure \
            --as=system:serviceaccount:sample-authz:sample-impersonation-denied
          apply_policy_docs sample-policy-block-clusterrolebindings \
            --as=output-delta-unassigned
          apply_policy_docs sample-policy-partially-allowed-bindings \
            --as=output-delta-unassigned
          SCRIPT
          chmod +x /tmp/apply-output-delta-samples.sh

      - name: Generate outputs from main branch
        id: main-output
        run: |
          set -euo pipefail
          cd main-branch

          make docker-build IMG=auth-operator:main
          kind load docker-image auth-operator:main --name "${BASELINE_CLUSTER}"

          make install
          make deploy IMG=auth-operator:main
          bash ../main-branch/hack/ci/apply-sample-impersonation-rbac.sh

          kubectl rollout status deployment/auth-operator-controller-manager -n auth-operator-system --timeout=180s
          kubectl rollout status deployment/auth-operator-webhook-server -n auth-operator-system --timeout=180s 2>/dev/null || \
            echo "::notice::Webhook server not found or not ready on main, continuing"
          sleep 5

          /tmp/apply-output-delta-samples.sh config/samples

          if [ -f config/samples/broken/kustomization.yaml ]; then
            /tmp/apply-output-delta-samples.sh config/samples/broken
          else
            echo "::notice::No config/samples/broken set on main, skipping broken-sample apply"
          fi

          wait_ready() {
            local resource="$1"
            kubectl wait --for=condition=Ready "$resource" --all --timeout=180s 2>/dev/null || \
              echo "::notice::Some $resource resources are intentionally not Ready"
          }

          wait_ready roledefinition
          wait_ready binddefinition
          wait_ready rbacpolicy
          wait_ready restrictedbinddefinition
          wait_ready restrictedroledefinition

          echo "Waiting 15s for main reconciliation to settle..."
          sleep 15
          kubectl wait --for=condition=Ready binddefinition --all --timeout=60s 2>/dev/null || true

          capture_args=(/tmp/main-output)
          if grep -q -- '--all-rbac)' ../main-branch/hack/ci/capture-operator-output.sh; then
            capture_args+=(--all-rbac)
          else
            echo "::notice::Trusted main capture helper does not support --all-rbac yet; using labelled RBAC capture for bootstrap compatibility"
          fi
          bash ../main-branch/hack/ci/capture-operator-output.sh "${capture_args[@]}"

          mkdir -p /tmp/controller-logs
          for ns in auth-operator-system kube-system default; do
            kubectl logs -n "$ns" -l control-plane=controller-manager >> "/tmp/controller-logs/main-${ns}-controller.log" 2>&1 || true
            kubectl logs -n "$ns" -l app.kubernetes.io/name=auth-operator >> "/tmp/controller-logs/main-${ns}-controller.log" 2>&1 || true
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              echo "=== Pod: $pod in $ns (main) ===" >> "/tmp/controller-logs/main-${ns}-controller.log"
              kubectl logs -n "$ns" "$pod" >> "/tmp/controller-logs/main-${ns}-controller.log" 2>&1 || true
            done < <(kubectl get pods -n "$ns" -l control-plane=controller-manager --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true)
            kubectl logs -n "$ns" -l control-plane=webhook-server > "/tmp/controller-logs/main-${ns}-webhook.log" 2>/dev/null || true
          done

          kubectl delete -k config/samples/broken/ --ignore-not-found --timeout=60s 2>/dev/null || true
          kubectl delete -k config/samples/ --ignore-not-found --timeout=60s 2>/dev/null || true
          kubectl wait --for=delete roledefinition --all --timeout=60s 2>/dev/null || true
          kubectl wait --for=delete binddefinition --all --timeout=60s 2>/dev/null || true
          kubectl wait --for=delete webhookauthorizer --all --timeout=60s 2>/dev/null || true
          kubectl wait --for=delete rbacpolicy --all --timeout=60s 2>/dev/null || true
          kubectl wait --for=delete restrictedbinddefinition --all --timeout=60s 2>/dev/null || true
          kubectl wait --for=delete restrictedroledefinition --all --timeout=60s 2>/dev/null || true
          make undeploy 2>/dev/null || true
          kubectl wait --for=delete deployment/auth-operator-controller-manager -n auth-operator-system --timeout=180s 2>/dev/null || true
          kubectl wait --for=delete deployment/auth-operator-webhook-server -n auth-operator-system --timeout=180s 2>/dev/null || true
          kubectl wait --for=delete pod -l control-plane=controller-manager -n auth-operator-system --timeout=180s 2>/dev/null || true
          kubectl wait --for=delete pod -l control-plane=webhook-server -n auth-operator-system --timeout=180s 2>/dev/null || true

      - name: Get latest release tag
        id: latest-tag
        run: |
          set -euo pipefail
          cd main-branch
          latest_tag="$(git tag -l 'v*.*.*' 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$latest_tag" ] && git rev-parse "$latest_tag" >/dev/null 2>&1; then
            echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"
            echo "has_tag=true" >> "$GITHUB_OUTPUT"
            echo "Latest release tag: $latest_tag"
          else
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No reachable v*.*.* release tag found"
          fi

      - name: Checkout latest tag
        if: steps.latest-tag.outputs.has_tag == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.latest-tag.outputs.tag }}
          path: tag-branch
          persist-credentials: false

      - name: Generate outputs from latest tag
        if: steps.latest-tag.outputs.has_tag == 'true'
        id: tag-output
        continue-on-error: true
        run: |
          set -euo pipefail
          cd tag-branch

          echo "tag_success=false" >> "$GITHUB_OUTPUT"
          make docker-build IMG=auth-operator:tag
          kind load docker-image auth-operator:tag --name "${BASELINE_CLUSTER}"

          make install 2>/dev/null || true
          make deploy IMG=auth-operator:tag
          bash ../main-branch/hack/ci/apply-sample-impersonation-rbac.sh

          kubectl rollout status deployment/auth-operator-controller-manager -n auth-operator-system --timeout=180s 2>/dev/null || true
          kubectl rollout status deployment/auth-operator-webhook-server -n auth-operator-system --timeout=180s 2>/dev/null || \
            echo "::notice::Webhook server not found or not ready for tag, continuing"
          sleep 5

          if ! /tmp/apply-output-delta-samples.sh config/samples; then
            echo "::warning::Tag samples failed to apply; skipping tag comparison"
            exit 0
          fi

          if [ -d config/samples/broken/ ]; then
            /tmp/apply-output-delta-samples.sh config/samples/broken
          else
            echo "::notice::No config/samples/broken set on tag, skipping broken-sample apply"
          fi

          kubectl wait --for=condition=Ready roledefinition --all --timeout=180s 2>/dev/null || true
          kubectl wait --for=condition=Ready binddefinition --all --timeout=180s 2>/dev/null || true
          kubectl wait --for=condition=Ready rbacpolicy --all --timeout=180s 2>/dev/null || true
          kubectl wait --for=condition=Ready restrictedbinddefinition --all --timeout=180s 2>/dev/null || true
          kubectl wait --for=condition=Ready restrictedroledefinition --all --timeout=180s 2>/dev/null || true
          sleep 15
          kubectl wait --for=condition=Ready binddefinition --all --timeout=60s 2>/dev/null || true

          capture_args=(/tmp/tag-output)
          if grep -q -- '--all-rbac)' ../main-branch/hack/ci/capture-operator-output.sh; then
            capture_args+=(--all-rbac)
          else
            echo "::notice::Trusted main capture helper does not support --all-rbac yet; using labelled RBAC capture for bootstrap compatibility"
          fi
          bash ../main-branch/hack/ci/capture-operator-output.sh "${capture_args[@]}"

          mkdir -p /tmp/controller-logs
          for ns in auth-operator-system kube-system default; do
            kubectl logs -n "$ns" -l control-plane=controller-manager >> "/tmp/controller-logs/tag-${ns}-controller.log" 2>&1 || true
            kubectl logs -n "$ns" -l app.kubernetes.io/name=auth-operator >> "/tmp/controller-logs/tag-${ns}-controller.log" 2>&1 || true
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              echo "=== Pod: $pod in $ns (tag) ===" >> "/tmp/controller-logs/tag-${ns}-controller.log"
              kubectl logs -n "$ns" "$pod" >> "/tmp/controller-logs/tag-${ns}-controller.log" 2>&1 || true
            done < <(kubectl get pods -n "$ns" -l control-plane=controller-manager --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true)
            kubectl logs -n "$ns" -l control-plane=webhook-server > "/tmp/controller-logs/tag-${ns}-webhook.log" 2>/dev/null || true
          done

          echo "tag_success=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping latest-tag in-step cleanup; the baseline kind cluster is deleted after artifacts are uploaded."

      - name: Upload main output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-main-output
          path: /tmp/main-output/
          retention-days: 7
          if-no-files-found: error

      - name: Upload tag output
        if: steps.tag-output.outputs.tag_success == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-tag-output
          path: /tmp/tag-output/
          retention-days: 7
          if-no-files-found: error

      - name: Upload trusted controller logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-trusted-controller-logs
          path: /tmp/controller-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup baseline cluster
        if: always()
        run: kind delete cluster --name "${BASELINE_CLUSTER}"

  candidate-pr:
    name: Candidate PR Outputs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      has_errors: ${{ steps.extract-errors.outputs.has_errors }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: pr-branch
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout trusted main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: main-branch
          persist-credentials: false

      - name: Load trusted tool versions
        run: |
          set -euo pipefail
          yq_version=""
          yq_linux_amd64_sha256=""
          while IFS='=' read -r key value; do
            case "${key}" in
              KIND_VERSION)
                if [[ ! "${value}" =~ ^v[0-9A-Za-z._+-]+$ ]]; then
                  echo "Invalid ${key}: ${value}" >&2
                  exit 1
                fi
                echo "${key}=${value}" >> "$GITHUB_ENV"
                ;;
              YQ_VERSION)
                if [[ ! "${value}" =~ ^v[0-9A-Za-z._+-]+$ ]]; then
                  echo "Invalid ${key}: ${value}" >&2
                  exit 1
                fi
                yq_version="${value}"
                ;;
              YQ_LINUX_AMD64_SHA256)
                if [[ ! "${value}" =~ ^[0-9a-f]{64}$ ]]; then
                  echo "Invalid ${key}: ${value}" >&2
                  exit 1
                fi
                yq_linux_amd64_sha256="${value}"
                ;;
            esac
          done < <(grep -Ev '^(#|$)' main-branch/versions.env)

          if [ -z "$yq_version" ] && [ -z "$yq_linux_amd64_sha256" ]; then
            yq_version="v4.53.3"
            yq_linux_amd64_sha256="fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4"
            echo "::notice::main versions.env does not define yq; using pinned bootstrap ${yq_version}"
          elif [ -z "$yq_version" ] || [ -z "$yq_linux_amd64_sha256" ]; then
            echo "main versions.env must define both YQ_VERSION and YQ_LINUX_AMD64_SHA256" >&2
            exit 1
          fi

          echo "YQ_VERSION=${yq_version}" >> "$GITHUB_ENV"
          echo "YQ_LINUX_AMD64_SHA256=${yq_linux_amd64_sha256}" >> "$GITHUB_ENV"

      - name: Setup Go Environment
        uses: ./main-branch/.github/actions/setup-go-env
        with:
          go-version-file: main-branch/go.mod
          install-kind: 'true'
          kind-version: ${{ env.KIND_VERSION }}
          cache-dependency-path: main-branch/go.sum

      - name: Install yq
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /tmp/yq
          echo "${YQ_LINUX_AMD64_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

      - name: Create kind cluster
        run: |
          kind create cluster --name "${CANDIDATE_CLUSTER}" --wait 5m
          kubectl cluster-info

      - name: Install popular CRDs
        run: KIND_CLUSTER_NAME="${CANDIDATE_CLUSTER}" bash main-branch/hack/ci/setup-kind-crds.sh

      - name: Create test namespaces
        run: bash main-branch/hack/ci/create-test-namespaces.sh

      - name: Create trusted sample apply helper
        run: |
          set -euo pipefail
          cat > /tmp/apply-output-delta-samples.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          sample_dir="${1:?Usage: apply-output-delta-samples.sh <sample-dir>}"
          if [ ! -d "$sample_dir" ]; then
            echo "::error::Sample directory not found: $sample_dir"
            exit 1
          fi

          render_samples() {
            local out="$1"
            if ! kubectl kustomize "$sample_dir" > "$out"; then
              echo "::error::Failed to render sample kustomization: $sample_dir"
              exit 1
            fi
          }

          apply_yaml() {
            local label="$1"
            local file="$2"
            shift 2

            if ! grep -q '^kind:' "$file"; then
              echo "No $label documents to apply"
              return 0
            fi

            for i in 1 2 3 4 5; do
              if kubectl apply --server-side --force-conflicts "$@" -f "$file"; then
                echo "Applied $label"
                return 0
              fi
              echo "$label apply attempt $i failed, waiting before retry..."
              sleep 10
            done

            echo "::error::$label failed to apply after 5 attempts"
            return 1
          }

          ensure_requester_rbac() {
            kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: auth-operator-output-delta-sample-requester
          rules:
            - apiGroups: ["authorization.t-caas.telekom.com"]
              resources:
                - restrictedbinddefinitions
                - restrictedroledefinitions
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: auth-operator-output-delta-sample-requester
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: auth-operator-output-delta-sample-requester
          subjects:
            - kind: ServiceAccount
              name: ci-rbac-applier
              namespace: ci-runners
            - kind: ServiceAccount
              name: team-alpha-rbac-applier
              namespace: team-alpha
            - kind: ServiceAccount
              name: sample-impersonation-denied
              namespace: sample-authz
            - kind: User
              name: output-delta-platform-operator
            - kind: User
              name: output-delta-sample-admin
            - kind: User
              name: output-delta-unassigned
          EOF
          }

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          rendered="$tmp/rendered.yaml"
          render_samples "$rendered"

          yq -o=yaml 'select(.kind != "RestrictedBindDefinition" and .kind != "RestrictedRoleDefinition")' "$rendered" > "$tmp/base.yaml"
          apply_yaml "non-restricted samples from $sample_dir" "$tmp/base.yaml"

          ensure_requester_rbac

          assert_known_policy_refs() {
            local policy
            while IFS= read -r policy; do
              [ -n "$policy" ] || continue
              case "$policy" in
                team-workload-policy|operator-cross-namespace-policy|cicd-pipeline-policy|sample-policy-allow-all-paths|sample-policy-impersonation-authz-failure|sample-policy-block-clusterrolebindings|sample-policy-partially-allowed-bindings)
                  ;;
                *)
                  echo "::error::Restricted sample policyRef $policy has no output-delta requester mapping"
                  exit 1
                  ;;
              esac
            done < <(yq -r --no-doc 'select(.kind == "RestrictedBindDefinition" or .kind == "RestrictedRoleDefinition") | .spec.policyRef.name // ""' "$rendered" | sort -u)
          }

          apply_policy_docs() {
            local policy="$1"
            shift
            local out="$tmp/${policy}.yaml"
            POLICY="$policy" yq -o=yaml 'select((.kind == "RestrictedBindDefinition" or .kind == "RestrictedRoleDefinition") and .spec.policyRef.name == strenv(POLICY))' "$rendered" > "$out"
            apply_yaml "restricted samples for policy $policy" "$out" "$@"
          }

          assert_known_policy_refs

          apply_policy_docs team-workload-policy \
            --as=system:serviceaccount:team-alpha:team-alpha-rbac-applier
          apply_policy_docs operator-cross-namespace-policy \
            --as=output-delta-platform-operator \
            --as-group=oidc:platform-operators
          apply_policy_docs cicd-pipeline-policy \
            --as=system:serviceaccount:ci-runners:ci-rbac-applier
          apply_policy_docs sample-policy-allow-all-paths \
            --as=output-delta-sample-admin \
            --as-group=oidc:sample-rbac-admins
          apply_policy_docs sample-policy-impersonation-authz-failure \
            --as=system:serviceaccount:sample-authz:sample-impersonation-denied
          apply_policy_docs sample-policy-block-clusterrolebindings \
            --as=output-delta-unassigned
          apply_policy_docs sample-policy-partially-allowed-bindings \
            --as=output-delta-unassigned
          SCRIPT
          chmod +x /tmp/apply-output-delta-samples.sh

      - name: Generate outputs from PR branch
        id: pr-output
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          main_dir="$workspace/main-branch"
          pr_dir="$workspace/pr-branch"
          trusted_bin="$main_dir/.trusted-bin"
          mkdir -p "$trusted_bin"

          kustomize_version="$(awk -F= '$1 == "KUSTOMIZE_VERSION" {print $2}' "$main_dir/versions.env")"
          if [[ ! "$kustomize_version" =~ ^v[0-9]+[A-Za-z0-9._-]*$ ]]; then
            echo "::error::Invalid KUSTOMIZE_VERSION from trusted main: $kustomize_version"
            exit 1
          fi
          GOBIN="$trusted_bin" go install "sigs.k8s.io/kustomize/kustomize/v5@${kustomize_version}"
          kustomize="$trusted_bin/kustomize"

          go_version="$(grep -E '^toolchain go' "$pr_dir/go.mod" | sed 's/toolchain go//' || true)"
          if [ -z "$go_version" ]; then
            go_version="$(grep -E '^go [0-9]' "$pr_dir/go.mod" | awk '{print $2}')"
          fi
          if [[ ! "$go_version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::Invalid Go version from PR go.mod: $go_version"
            exit 1
          fi

          docker build \
            --build-arg GO_VERSION="$go_version" \
            -f "$main_dir/Dockerfile" \
            -t auth-operator:pr \
            "$pr_dir"
          kind load docker-image auth-operator:pr --name "${CANDIDATE_CLUSTER}"

          "$kustomize" build "$pr_dir/config/crd" | kubectl apply -f -

          render_dir="$(mktemp -d)"
          cp -R "$pr_dir/config" "$render_dir/config"
          (
            cd "$render_dir/config/overlays/dev"
            "$kustomize" edit set image controller=auth-operator:pr
          )
          "$kustomize" build "$render_dir/config/overlays/dev" | kubectl apply -f -

          bash "$main_dir/hack/ci/apply-sample-impersonation-rbac.sh"

          kubectl rollout status deployment/auth-operator-controller-manager -n auth-operator-system --timeout=180s
          kubectl rollout status deployment/auth-operator-webhook-server -n auth-operator-system --timeout=180s
          sleep 5

          cd "$pr_dir"
          /tmp/apply-output-delta-samples.sh config/samples

          if [ -d config/samples/broken/ ]; then
            /tmp/apply-output-delta-samples.sh config/samples/broken
          else
            echo "::notice::config/samples/broken/ not present on PR branch, skipping broken-sample apply"
          fi

          wait_condition() {
            local resource="$1"
            local selector="$2"
            local condition="$3"
            local expected="$4"
            local message_substring="${5:-}"
            local timeout="${6:-180}"
            local deadline=$((SECONDS + timeout))
            local output count pending

            while true; do
              output="$(kubectl get "$resource" -l "$selector" -o yaml)"
              count="$(yq '.items | length' <<<"$output")"
              if [ "$count" = "0" ]; then
                echo "::error::No $resource resources match selector '$selector'"
                return 1
              fi

              if [ -n "$message_substring" ]; then
                pending="$(CONDITION_TYPE="$condition" CONDITION_STATUS="$expected" MESSAGE_SUBSTRING="$message_substring" yq -r '.items[] | select(([.status.conditions[]? | select(.type == strenv(CONDITION_TYPE) and .status == strenv(CONDITION_STATUS) and ((.message // "") | contains(strenv(MESSAGE_SUBSTRING))))] | length) == 0) | .metadata.name' <<<"$output")"
              else
                pending="$(CONDITION_TYPE="$condition" CONDITION_STATUS="$expected" yq -r '.items[] | select(([.status.conditions[]? | select(.type == strenv(CONDITION_TYPE) and .status == strenv(CONDITION_STATUS))] | length) == 0) | .metadata.name' <<<"$output")"
              fi

              if [ -z "$pending" ]; then
                echo "All $count $resource resources matching '$selector' have $condition=$expected"
                return 0
              fi

              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$resource resources still missing $condition=$expected after ${timeout}s: $(tr '\n' ' ' <<<"$pending")"
                kubectl get "$resource" -l "$selector" -o yaml
                return 1
              fi

              echo "Waiting for $resource $condition=$expected ($selector); pending: $(tr '\n' ' ' <<<"$pending")"
              sleep 5
            done
          }

          wait_ready() {
            local resource="$1"
            kubectl wait --for=condition=Ready "$resource" --all --timeout=180s
          }

          wait_missing_role_refs() {
            local resource="$1"
            local selector="$2"
            local expected_ref="${3:-}"
            local timeout="${4:-180}"
            local deadline=$((SECONDS + timeout))
            local output count pending

            while true; do
              output="$(kubectl get "$resource" -l "$selector" -o yaml)"
              count="$(yq '.items | length' <<<"$output")"
              if [ "$count" = "0" ]; then
                echo "::error::No $resource resources match selector '$selector'"
                return 1
              fi

              if [ -n "$expected_ref" ]; then
                pending="$(EXPECTED_REF="$expected_ref" yq -r '.items[] | select(([.status.missingRoleRefs[]? | select(. == strenv(EXPECTED_REF))] | length) == 0) | .metadata.name' <<<"$output")"
              else
                pending="$(yq -r '.items[] | select(((.status.missingRoleRefs // []) | length) == 0) | .metadata.name' <<<"$output")"
              fi
              if [ -z "$pending" ]; then
                return 0
              fi

              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$resource resources still missing expected status.missingRoleRefs after ${timeout}s: $(tr '\n' ' ' <<<"$pending")"
                kubectl get "$resource" -l "$selector" -o yaml
                return 1
              fi

              echo "Waiting for $resource missingRoleRefs ($selector); pending: $(tr '\n' ' ' <<<"$pending")"
              sleep 5
            done
          }

          wait_policy_violation() {
            local resource="$1"
            local selector="$2"
            local expected_violation="$3"
            local timeout="${4:-180}"
            local deadline=$((SECONDS + timeout))
            local output count pending

            while true; do
              output="$(kubectl get "$resource" -l "$selector" -o yaml)"
              count="$(yq '.items | length' <<<"$output")"
              if [ "$count" = "0" ]; then
                echo "::error::No $resource resources match selector '$selector'"
                return 1
              fi

              pending="$(EXPECTED_VIOLATION="$expected_violation" yq -r '.items[] | select((([.status.conditions[]? | select(.type == "PolicyCompliant" and .status == "False" and .reason == "ViolationsDetected")] | length) == 0) or (([.status.policyViolations[]? | select(. == strenv(EXPECTED_VIOLATION))] | length) == 0)) | .metadata.name' <<<"$output")"
              if [ -z "$pending" ]; then
                return 0
              fi

              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$resource resources still missing expected policy violation after ${timeout}s: $(tr '\n' ' ' <<<"$pending")"
                kubectl get "$resource" -l "$selector" -o yaml
                return 1
              fi

              echo "Waiting for $resource policy violation ($selector); pending: $(tr '\n' ' ' <<<"$pending")"
              sleep 5
            done
          }

          wait_absent() {
            local resource="$1"
            local name="$2"
            local namespace="${3:-}"
            local timeout="${4:-60}"
            local deadline=$((SECONDS + timeout))

            while true; do
              if [ -n "$namespace" ]; then
                if ! kubectl get "$resource" "$name" -n "$namespace" >/dev/null 2>&1; then
                  return 0
                fi
              else
                if ! kubectl get "$resource" "$name" >/dev/null 2>&1; then
                  return 0
                fi
              fi

              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$resource ${namespace:+$namespace/}$name exists but should be absent"
                if [ -n "$namespace" ]; then
                  kubectl get "$resource" "$name" -n "$namespace" -o yaml
                else
                  kubectl get "$resource" "$name" -o yaml
                fi
                return 1
              fi
              sleep 5
            done
          }

          wait_present() {
            local resource="$1"
            local name="$2"
            local namespace="${3:-}"
            local timeout="${4:-60}"
            local deadline=$((SECONDS + timeout))

            while true; do
              if [ -n "$namespace" ]; then
                if kubectl get "$resource" "$name" -n "$namespace" >/dev/null 2>&1; then
                  return 0
                fi
              else
                if kubectl get "$resource" "$name" >/dev/null 2>&1; then
                  return 0
                fi
              fi

              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$resource ${namespace:+$namespace/}$name is missing"
                return 1
              fi
              sleep 5
            done
          }

          assert_no_rule_match() {
            local resource="$1"
            local name="$2"
            local namespace="$3"
            local description="$4"
            local jq_filter="$5"
            local json

            if [ -n "$namespace" ]; then
              json="$(kubectl get "$resource" "$name" -n "$namespace" -o json)"
            else
              json="$(kubectl get "$resource" "$name" -o json)"
            fi

            if jq -e "$jq_filter" <<<"$json" >/tmp/output-delta-rule-match.json; then
              echo "::error::$resource $name has forbidden rule content: $description"
              cat /tmp/output-delta-rule-match.json
              return 1
            fi
          }

          assert_negative_validation_samples_rejected() {
            local file="config/samples/broken/authorization_v1alpha1_negative_validation_cases.yaml"
            if [ ! -f "$file" ]; then
              echo "::notice::Negative validation sample file not present, skipping admission rejection assertions"
              return 0
            fi

            local split_dir
            split_dir="$(mktemp -d)"
            csplit -s -f "$split_dir/doc-" -b "%03d.yaml" "$file" '/^---[[:space:]]*$/' '{*}' || true

            local rejected=0
            shopt -s nullglob
            for doc in "$split_dir"/doc-*.yaml; do
              if ! grep -q '^kind:' "$doc"; then
                continue
              fi
              local name output
              name="$(yq -r '.kind + "/" + .metadata.name' "$doc")"
              output="$split_dir/output-${rejected}.txt"
              if kubectl apply --dry-run=server -f "$doc" >"$output" 2>&1; then
                echo "::error::Negative validation sample $name unexpectedly passed server-side dry-run"
                cat "$doc"
                return 1
              fi
              echo "Rejected negative validation sample $name"
              rejected=$((rejected + 1))
            done
            shopt -u nullglob

            if [ "$rejected" -eq 0 ]; then
              echo "::error::No negative validation sample documents were found in $file"
              return 1
            fi
          }

          assert_negative_validation_samples_rejected

          wait_ready roledefinition
          wait_ready binddefinition
          wait_ready rbacpolicy
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case in (allowed,impersonated-allowed)' Ready True
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case in (allowed,partial,impersonated-allowed)' PolicyCompliant True
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case=partial' Ready False
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case=partial' RoleRefsValid False
          wait_missing_role_refs restrictedbinddefinition 't-caas.telekom.com/sample-case=partial' 'Role/sample-tenant-a/sample-missing-role'
          wait_condition restrictedroledefinition 't-caas.telekom.com/sample-case in (allowed,partial,impersonated-allowed)' Ready True
          wait_condition restrictedroledefinition 't-caas.telekom.com/sample-case in (allowed,partial,impersonated-allowed)' PolicyCompliant True
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case in (blocked,blocked-subject)' Ready False
          wait_policy_violation restrictedbinddefinition 't-caas.telekom.com/sample-case=blocked' 'spec.clusterRoleBindings: ClusterRoleBindings are not allowed by policy'
          wait_policy_violation restrictedbinddefinition 't-caas.telekom.com/sample-case=blocked-subject' 'spec.subjects[0].kind: subject kind "User" is not allowed by policy'
          wait_condition restrictedroledefinition 't-caas.telekom.com/sample-case in (blocked,blocked-forbidden-verb)' Ready False
          wait_policy_violation restrictedroledefinition 't-caas.telekom.com/sample-case=blocked' 'spec.targetRole: ClusterRoles are not allowed by policy'
          wait_policy_violation restrictedroledefinition 't-caas.telekom.com/sample-case=blocked-forbidden-verb' 'spec.restrictedVerbs: forbidden verb "escalate" must be listed in restrictedVerbs'
          wait_absent clusterrolebinding sample-blocked-crb-sample-existing-cluster-role-binding
          wait_absent rolebinding sample-blocked-subject-kind-sample-existing-role-binding sample-tenant-a
          wait_absent clusterrole sample-clusterrole-blocked
          wait_absent role sample-blocked-forbidden-verb sample-tenant-a
          wait_present clusterrolebinding sample-allowed-binding-sample-existing-cluster-role-binding
          wait_present rolebinding sample-allowed-binding-sample-existing-cluster-role-binding sample-tenant-a
          wait_present rolebinding sample-allowed-binding-sample-existing-role-binding sample-tenant-a
          wait_present serviceaccount sample-workload-a sample-tenant-a
          wait_present clusterrole sample-cluster-reader
          wait_present role sample-partial-role sample-tenant-a
          assert_no_rule_match clusterrole sample-cluster-reader "" "restricted resources and verbs are filtered" '.rules[]? | select(((.resources // []) | index("secrets")) or ((.verbs // []) | index("delete")) or ((.verbs // []) | index("escalate")) or ((.verbs // []) | index("impersonate")) or ((.verbs // []) | index("bind")))'
          assert_no_rule_match role sample-partial-role sample-tenant-a "restricted API groups, resources, and verbs are filtered" '.rules[]? | select(((.apiGroups // []) | index("apps")) or ((.resources // []) | index("secrets")) or ((.verbs // []) | index("delete")) or ((.verbs // []) | index("patch")))'
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case=impersonated-failed' Stalled True "authorization denied"
          wait_condition restrictedroledefinition 't-caas.telekom.com/sample-case=impersonated-failed' Stalled True "authorization denied"

          echo "Waiting 15s for PR reconciliation to settle..."
          sleep 15
          wait_ready binddefinition
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case in (allowed,impersonated-allowed)' Ready True
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case=partial' Ready False
          wait_condition restrictedbinddefinition 't-caas.telekom.com/sample-case=partial' RoleRefsValid False
          wait_condition restrictedroledefinition 't-caas.telekom.com/sample-case in (allowed,partial,impersonated-allowed)' Ready True
          wait_missing_role_refs restrictedbinddefinition 't-caas.telekom.com/sample-case=partial' 'Role/sample-tenant-a/sample-missing-role'
          wait_policy_violation restrictedbinddefinition 't-caas.telekom.com/sample-case=blocked' 'spec.clusterRoleBindings: ClusterRoleBindings are not allowed by policy'
          wait_policy_violation restrictedbinddefinition 't-caas.telekom.com/sample-case=blocked-subject' 'spec.subjects[0].kind: subject kind "User" is not allowed by policy'
          wait_policy_violation restrictedroledefinition 't-caas.telekom.com/sample-case=blocked' 'spec.targetRole: ClusterRoles are not allowed by policy'
          wait_policy_violation restrictedroledefinition 't-caas.telekom.com/sample-case=blocked-forbidden-verb' 'spec.restrictedVerbs: forbidden verb "escalate" must be listed in restrictedVerbs'
          wait_absent clusterrolebinding sample-blocked-crb-sample-existing-cluster-role-binding
          wait_absent rolebinding sample-blocked-subject-kind-sample-existing-role-binding sample-tenant-a
          wait_absent clusterrole sample-clusterrole-blocked
          wait_absent role sample-blocked-forbidden-verb sample-tenant-a
          wait_present clusterrolebinding sample-allowed-binding-sample-existing-cluster-role-binding
          wait_present rolebinding sample-allowed-binding-sample-existing-cluster-role-binding sample-tenant-a
          wait_present rolebinding sample-allowed-binding-sample-existing-role-binding sample-tenant-a
          wait_present serviceaccount sample-workload-a sample-tenant-a
          wait_present clusterrole sample-cluster-reader
          wait_present role sample-partial-role sample-tenant-a
          assert_no_rule_match clusterrole sample-cluster-reader "" "restricted resources and verbs are filtered" '.rules[]? | select(((.resources // []) | index("secrets")) or ((.verbs // []) | index("delete")) or ((.verbs // []) | index("escalate")) or ((.verbs // []) | index("impersonate")) or ((.verbs // []) | index("bind")))'
          assert_no_rule_match role sample-partial-role sample-tenant-a "restricted API groups, resources, and verbs are filtered" '.rules[]? | select(((.apiGroups // []) | index("apps")) or ((.resources // []) | index("secrets")) or ((.verbs // []) | index("delete")) or ((.verbs // []) | index("patch")))'

          capture_args=(/tmp/pr-output)
          if grep -q -- '--all-rbac)' "$main_dir/hack/ci/capture-operator-output.sh"; then
            capture_args+=(--all-rbac)
          else
            echo "::notice::Trusted main capture helper does not support --all-rbac yet; using labelled RBAC capture for bootstrap compatibility"
          fi
          bash "$main_dir/hack/ci/capture-operator-output.sh" "${capture_args[@]}"

      - name: Collect PR controller logs
        if: always()
        run: |
          mkdir -p /tmp/controller-logs
          echo "=== All pods ===" > /tmp/controller-logs/debug-pods.txt
          kubectl get pods -A -o wide >> /tmp/controller-logs/debug-pods.txt 2>&1 || true

          for ns in auth-operator-system kube-system default; do
            kubectl logs -n "$ns" -l control-plane=controller-manager >> "/tmp/controller-logs/pr-${ns}-controller.log" 2>&1 || true
            kubectl logs -n "$ns" -l app.kubernetes.io/name=auth-operator >> "/tmp/controller-logs/pr-${ns}-controller.log" 2>&1 || true
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              echo "=== Pod: $pod in $ns (PR) ===" >> "/tmp/controller-logs/pr-${ns}-controller.log"
              kubectl logs -n "$ns" "$pod" >> "/tmp/controller-logs/pr-${ns}-controller.log" 2>&1 || true
            done < <(kubectl get pods -n "$ns" -l control-plane=controller-manager --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true)
            kubectl logs -n "$ns" -l control-plane=webhook-server > "/tmp/controller-logs/pr-${ns}-webhook.log" 2>/dev/null || true
          done

          kubectl get events -A --sort-by='.lastTimestamp' -o wide > /tmp/controller-logs/all-events.txt 2>/dev/null || true
          kubectl get pods -A > /tmp/controller-logs/all-pods.txt 2>/dev/null || true
          kubectl get roledefinitions -A -o yaml > /tmp/controller-logs/roledefinitions.yaml 2>/dev/null || true
          kubectl get binddefinitions -A -o yaml > /tmp/controller-logs/binddefinitions.yaml 2>/dev/null || true
          kubectl get rbacpolicies -A -o yaml > /tmp/controller-logs/rbacpolicies.yaml 2>/dev/null || true
          kubectl get restrictedbinddefinitions -A -o yaml > /tmp/controller-logs/restrictedbinddefinitions.yaml 2>/dev/null || true
          kubectl get restrictedroledefinitions -A -o yaml > /tmp/controller-logs/restrictedroledefinitions.yaml 2>/dev/null || true

      - name: Extract PR errors from logs
        if: always()
        id: extract-errors
        run: |
          mkdir -p /tmp/error-summary
          error_log="/tmp/error-summary/errors.txt"
          {
            echo "# Error Summary from PR Controller Logs"
            echo ""
          } > "$error_log"
          controller_error_count=0
          expected_error_count=0
          expected_error_pattern='(rbd-case-impersonated-authz-failure|rrd-case-impersonated-authz-failure)'

          for log in /tmp/controller-logs/*.log; do
            if [ -f "$log" ] && [ -s "$log" ]; then
              log_name="$(basename "$log")"
              error_matches="$(grep -E '(^E[0-9]{4}[[:space:]]|"level":"error"|level=error|panic:|PANIC)' "$log" 2>/dev/null || true)"
              if [ -n "$error_matches" ]; then
                expected_errors="$(grep -E "$expected_error_pattern" <<<"$error_matches" || true)"
                unexpected_errors="$(grep -Ev "$expected_error_pattern" <<<"$error_matches" || true)"
                if [ -n "$unexpected_errors" ]; then
                  count="$(wc -l <<<"$unexpected_errors" | tr -d '[:space:]')"
                  unexpected_preview="$(head -50 <<<"$unexpected_errors")"
                  controller_error_count=$((controller_error_count + count))
                  {
                    echo "## $log_name"
                    echo '```'
                    echo "$unexpected_preview"
                    echo '```'
                    echo ""
                  } >> "$error_log"
                fi
                if [ -n "$expected_errors" ]; then
                  count="$(wc -l <<<"$expected_errors" | tr -d '[:space:]')"
                  expected_preview="$(head -50 <<<"$expected_errors")"
                  expected_error_count=$((expected_error_count + count))
                  {
                    echo "## $log_name (expected broken samples)"
                    echo '```'
                    echo "$expected_preview"
                    echo '```'
                    echo ""
                  } >> "$error_log"
                fi
              fi
            fi
          done

          {
            echo "Unexpected controller errors counted: $controller_error_count"
            echo "Expected broken-sample errors ignored for gate: $expected_error_count"
            echo ""
          } >> "$error_log"

          {
            echo "## Warning/Error Events"
            echo '```'
          } >> "$error_log"
          grep -iE '(Warning|Error|Failed|BackOff)' /tmp/controller-logs/all-events.txt 2>/dev/null >> "$error_log" || echo "No warning events found" >> "$error_log"
          echo '```' >> "$error_log"

          if [ "$controller_error_count" -gt 0 ]; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload PR output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-pr-output
          path: /tmp/pr-output/
          retention-days: 7
          if-no-files-found: error

      - name: Upload PR controller logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-pr-controller-logs
          path: /tmp/controller-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PR error summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-pr-error-summary
          path: /tmp/error-summary/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup candidate cluster
        if: always()
        run: kind delete cluster --name "${CANDIDATE_CLUSTER}"

  compare-output:
    name: Trusted Compare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - trusted-baseline
      - candidate-pr
    if: always()
    steps:
      - name: Download main output
        if: needs.trusted-baseline.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: output-delta-main-output
          path: /tmp/main-output

      - name: Download tag output
        if: needs.trusted-baseline.outputs.tag_success == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: output-delta-tag-output
          path: /tmp/tag-output

      - name: Download PR output
        if: needs.candidate-pr.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: output-delta-pr-output
          path: /tmp/pr-output

      - name: Download PR error summary
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: output-delta-pr-error-summary
          path: /tmp/pr-error-summary

      - name: Generate trusted diff
        id: diff
        env:
          BASELINE_RESULT: ${{ needs.trusted-baseline.result }}
          CANDIDATE_RESULT: ${{ needs.candidate-pr.result }}
          TAG_SUCCESS: ${{ needs.trusted-baseline.outputs.tag_success }}
          PR_HAS_ERRORS: ${{ needs.candidate-pr.outputs.has_errors }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/diff-output/main /tmp/diff-output/tag
          github_output() {
            echo "$1" >> "$GITHUB_OUTPUT"
          }

          github_output "has_rbac_diff=false"
          github_output "has_status_diff=false"
          github_output "has_errors=${PR_HAS_ERRORS:-false}"

          if [ "$BASELINE_RESULT" != "success" ]; then
            github_output "has_diff=unknown"
            github_output "has_tag_diff=false"
            echo "::error::Trusted baseline job did not succeed; output delta cannot be computed"
            exit 1
          fi
          if [ "$CANDIDATE_RESULT" != "success" ]; then
            github_output "has_diff=unknown"
            github_output "has_tag_diff=false"
            echo "::error::Candidate PR job did not succeed; output delta cannot be computed"
            exit 1
          fi
          if [ ! -d /tmp/main-output ] || [ ! -d /tmp/pr-output ]; then
            github_output "has_diff=unknown"
            github_output "has_tag_diff=false"
            echo "::error::Required output artifacts are missing"
            exit 1
          fi

          diff_file() {
            local left="$1"
            local right="$2"
            local out="$3"
            if [ -f "$left" ] && [ -f "$right" ]; then
              diff -u "$left" "$right" > "$out" 2>&1 || true
            elif [ -f "$right" ]; then
              diff -u /dev/null "$right" > "$out" 2>&1 || true
            elif [ -f "$left" ]; then
              diff -u "$left" /dev/null > "$out" 2>&1 || true
            fi
          }

          has_diff_files() {
            local dir="$1"
            local file
            for file in "$dir"/*.diff; do
              [ -e "$file" ] || continue
              if [ -s "$file" ]; then
                return 0
              fi
            done
            return 1
          }

          append_diff_files() {
            local dir="$1"
            local out="$2"
            local file
            for file in "$dir"/*.diff; do
              [ -e "$file" ] || continue
              if [ -s "$file" ]; then
                cat "$file" >> "$out"
              fi
            done
          }

          for resource in clusterroles roles clusterrolebindings rolebindings serviceaccounts; do
            diff_file "/tmp/main-output/${resource}.yaml" "/tmp/pr-output/${resource}.yaml" "/tmp/diff-output/main/${resource}.diff"
          done
          for resource in roledefinitions-status binddefinitions-status rbacpolicies-status restrictedbinddefinitions-status restrictedroledefinitions-status webhookauthorizers-status; do
            diff_file "/tmp/main-output/${resource}.yaml" "/tmp/pr-output/${resource}.yaml" "/tmp/diff-output/main/${resource}.diff"
          done
          diff_file /tmp/main-output/metrics.txt /tmp/pr-output/metrics.txt /tmp/diff-output/main/metrics.diff
          has_main_diff=false
          if has_diff_files /tmp/diff-output/main; then
            has_main_diff=true
          fi

          has_tag_diff=false
          if [ "$TAG_SUCCESS" = "true" ] && [ -d /tmp/tag-output ]; then
            for resource in clusterroles roles clusterrolebindings rolebindings serviceaccounts; do
              diff_file "/tmp/tag-output/${resource}.yaml" "/tmp/pr-output/${resource}.yaml" "/tmp/diff-output/tag/${resource}.diff"
            done
            for resource in roledefinitions-status binddefinitions-status rbacpolicies-status restrictedbinddefinitions-status restrictedroledefinitions-status webhookauthorizers-status; do
              diff_file "/tmp/tag-output/${resource}.yaml" "/tmp/pr-output/${resource}.yaml" "/tmp/diff-output/tag/${resource}.diff"
            done
            diff_file /tmp/tag-output/metrics.txt /tmp/pr-output/metrics.txt /tmp/diff-output/tag/metrics.diff
            if has_diff_files /tmp/diff-output/tag; then
              has_tag_diff=true
            fi
          fi
          github_output "has_tag_diff=${has_tag_diff}"

          : > /tmp/diff-output/full-diff.txt
          append_diff_files /tmp/diff-output/main /tmp/diff-output/full-diff.txt
          append_diff_files /tmp/diff-output/tag /tmp/diff-output/full-diff.txt
          if [ "$has_main_diff" = "false" ] && [ "$has_tag_diff" = "false" ] && diff -qr /tmp/main-output /tmp/pr-output >/dev/null 2>&1; then
            github_output "has_diff=false"
          else
            github_output "has_diff=true"
          fi

          has_rbac_diff=false
          for resource in clusterroles roles clusterrolebindings rolebindings serviceaccounts; do
            if [ -s "/tmp/diff-output/main/${resource}.diff" ]; then
              has_rbac_diff=true
            fi
          done
          github_output "has_rbac_diff=${has_rbac_diff}"

          has_status_diff=false
          for resource in roledefinitions-status binddefinitions-status rbacpolicies-status restrictedbinddefinitions-status restrictedroledefinitions-status webhookauthorizers-status; do
            if [ -s "/tmp/diff-output/main/${resource}.diff" ]; then
              has_status_diff=true
            fi
          done
          github_output "has_status_diff=${has_status_diff}"

          if [ "$has_rbac_diff" = "true" ]; then
            echo "::warning::RBAC output differences detected; inspect output-delta-diff-output before merging"
          fi
          if [ "$has_status_diff" = "true" ]; then
            echo "::warning::CRD status output differences detected; inspect output-delta-diff-output before merging"
          fi
          if [ "${PR_HAS_ERRORS:-false}" = "true" ]; then
            echo "::error::PR controller logs contain repeated errors; inspect output-delta-pr-error-summary"
            exit 1
          fi

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-diff-output
          path: /tmp/diff-output/
          retention-days: 7
          if-no-files-found: warn

      - name: Write output-delta summary
        if: always()
        env:
          HAS_DIFF: ${{ steps.diff.outputs.has_diff }}
          HAS_RBAC_DIFF: ${{ steps.diff.outputs.has_rbac_diff }}
          HAS_STATUS_DIFF: ${{ steps.diff.outputs.has_status_diff }}
          HAS_TAG_DIFF: ${{ steps.diff.outputs.has_tag_diff }}
          PR_HAS_ERRORS: ${{ steps.diff.outputs.has_errors }}
          BASELINE_RESULT: ${{ needs.trusted-baseline.result }}
          CANDIDATE_RESULT: ${{ needs.candidate-pr.result }}
          LATEST_TAG: ${{ needs.trusted-baseline.outputs.latest_tag }}
        run: |
          if [ "${HAS_DIFF:-unknown}" = "true" ]; then
            echo "::warning::Output differences detected; inspect the output-delta-diff-output artifact"
          fi
          if [ "${HAS_RBAC_DIFF:-false}" = "true" ]; then
            echo "::warning::RBAC output differences detected"
          fi
          if [ "${HAS_STATUS_DIFF:-false}" = "true" ]; then
            echo "::warning::CRD status output differences detected"
          fi
          if [ "${PR_HAS_ERRORS:-false}" = "true" ]; then
            echo "::error::PR controller logs contain repeated errors"
          fi
          {
            echo "## Output Delta"
            echo ""
            echo "- Trusted baseline job: ${BASELINE_RESULT}"
            echo "- Candidate PR job: ${CANDIDATE_RESULT}"
            echo "- Differences detected: ${HAS_DIFF:-unknown}"
            echo "- RBAC differences detected: ${HAS_RBAC_DIFF:-false}"
            echo "- CRD status differences detected: ${HAS_STATUS_DIFF:-false}"
            echo "- Candidate log errors detected: ${PR_HAS_ERRORS:-false}"
            echo "- Latest tag diff generated: ${HAS_TAG_DIFF:-false}"
            if [ -n "${LATEST_TAG:-}" ]; then
              echo "- Latest release tag compared: ${LATEST_TAG}"
            fi
            echo "- Diff artifacts: uploaded as \`output-delta-diff-output\`"
            if [ -f /tmp/pr-error-summary/errors.txt ]; then
              echo "- PR error summary artifact: uploaded as \`output-delta-pr-error-summary\`"
            fi
            echo ""
            echo "The compare job downloads artifacts only; it does not checkout or execute pull-request code."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write output-delta comment data
        if: always()
        env:
          HAS_DIFF: ${{ steps.diff.outputs.has_diff }}
          HAS_RBAC_DIFF: ${{ steps.diff.outputs.has_rbac_diff }}
          HAS_STATUS_DIFF: ${{ steps.diff.outputs.has_status_diff }}
          HAS_TAG_DIFF: ${{ steps.diff.outputs.has_tag_diff }}
          PR_HAS_ERRORS: ${{ steps.diff.outputs.has_errors }}
          BASELINE_RESULT: ${{ needs.trusted-baseline.result }}
          CANDIDATE_RESULT: ${{ needs.candidate-pr.result }}
          LATEST_TAG: ${{ needs.trusted-baseline.outputs.latest_tag }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/comment-output
          {
            echo "has_diff=${HAS_DIFF:-unknown}"
            echo "has_rbac_diff=${HAS_RBAC_DIFF:-false}"
            echo "has_status_diff=${HAS_STATUS_DIFF:-false}"
            echo "has_tag_diff=${HAS_TAG_DIFF:-false}"
            echo "pr_has_errors=${PR_HAS_ERRORS:-false}"
            echo "baseline_result=${BASELINE_RESULT}"
            echo "candidate_result=${CANDIDATE_RESULT}"
            echo "latest_tag=${LATEST_TAG:-}"
          } > /tmp/comment-output/status.env

      - name: Upload output-delta comment data
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output-delta-comment-data
          path: /tmp/comment-output/
          retention-days: 7
          if-no-files-found: error
