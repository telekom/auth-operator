name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    name: Add Labels to PR
    runs-on: ubuntu-latest
    steps:
      - name: Skip labeler for forked pull requests
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::notice::Skipping PR label updates for forked pull requests because GITHUB_TOKEN is read-only."

      - name: Add labels based on changed files
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  size-label:
    name: Add Size Label
    runs-on: ubuntu-latest
    steps:
      - name: Skip size labeler for forked pull requests
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::notice::Skipping PR size label updates for forked pull requests because GITHUB_TOKEN is read-only."

      - name: Add size label
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 100
          m_label: 'size/M'
          m_max_size: 500
          l_label: 'size/L'
          l_max_size: 1000
          xl_label: 'size/XL'
          fail_if_xl: false
          message_if_xl: >
            This PR is quite large. Consider breaking it into smaller PRs for easier review.
