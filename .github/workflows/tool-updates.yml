name: Check Tool Updates

on:
  schedule:
    # Run weekly on Wednesday at 8:00 UTC
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-updates:
    name: Check for Tool Updates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Load versions.env
        id: versions
        run: |
          set -euo pipefail

          while IFS='=' read -r key value; do
            [[ "$key" =~ ^[A-Z0-9_]+$ ]] || { echo "::error::invalid key in versions.env: ${key}"; exit 1; }
            [[ "$value" =~ ^[A-Za-z0-9._/+:-]+$ ]] || { echo "::error::invalid value for ${key}"; exit 1; }

            case "$key" in
              KUSTOMIZE_VERSION) echo "kustomize=${value}" >> "$GITHUB_OUTPUT" ;;
              CONTROLLER_TOOLS_VERSION) echo "controller_tools=${value}" >> "$GITHUB_OUTPUT" ;;
              ENVTEST_VERSION) echo "envtest=${value}" >> "$GITHUB_OUTPUT" ;;
              ENVTEST_K8S_VERSION) echo "envtest_k8s=${value}" >> "$GITHUB_OUTPUT" ;;
              GOLANGCI_LINT_VERSION) echo "golangci_lint=${value}" >> "$GITHUB_OUTPUT" ;;
              CRD_REF_DOCS_VERSION) echo "crd_ref_docs=${value}" >> "$GITHUB_OUTPUT" ;;
              HELMIFY_VERSION) echo "helmify=${value}" >> "$GITHUB_OUTPUT" ;;
              MOCKGEN_VERSION) echo "mockgen=${value}" >> "$GITHUB_OUTPUT" ;;
              YQ_VERSION) echo "yq=${value}" >> "$GITHUB_OUTPUT" ;;
              GOVULNCHECK_VERSION) echo "govulncheck=${value}" >> "$GITHUB_OUTPUT" ;;
              GOSEC_VERSION) echo "gosec=${value}" >> "$GITHUB_OUTPUT" ;;
              KIND_VERSION) echo "kind=${value}" >> "$GITHUB_OUTPUT" ;;
              KIND_K8S_VERSION) echo "kind_k8s=${value}" >> "$GITHUB_OUTPUT" ;;
              HELM_VERSION) echo "helm=${value}" >> "$GITHUB_OUTPUT" ;;
              HELM_TEST_CERT_MANAGER_VERSION) echo "helm_test_cert_manager=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_CERT_MANAGER_VERSION) echo "e2e_cert_manager=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_GATEWAY_API_VERSION) echo "e2e_gateway_api=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_PROMETHEUS_OPERATOR_VERSION) echo "e2e_prometheus_operator=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_CALICO_VERSION) echo "e2e_calico=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_EXTERNAL_SECRETS_VERSION) echo "e2e_external_secrets=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_VELERO_VERSION) echo "e2e_velero=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_UTILS_CERT_MANAGER_VERSION) echo "e2e_utils_cert_manager=${value}" >> "$GITHUB_OUTPUT" ;;
              E2E_UTILS_PROMETHEUS_OPERATOR_VERSION) echo "e2e_utils_prometheus_operator=${value}" >> "$GITHUB_OUTPUT" ;;
              *) ;;
            esac
          done < <(grep -Ev '^(#|$)' versions.env)

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "found=false" >> "$GITHUB_OUTPUT"

          check_github_release() {
            local repo=$1
            local current=$2
            local name=$3
            local strip_prefix="${4:-}"

            latest=$(gh api "repos/${repo}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "unknown")
            if [ -n "$strip_prefix" ]; then
              latest="${latest#"$strip_prefix"}"
            fi
            if [ "$latest" != "unknown" ] && [ "$latest" != "$current" ]; then
              echo "  - **${name}**: ${current} → ${latest} ([releases](https://github.com/${repo}/releases))" >> updates.md
              echo "found=true" >> "$GITHUB_OUTPUT"
            fi
          }

          check_github_release_matching() {
            local repo=$1
            local current=$2
            local name=$3
            local pattern=$4
            local latest

            latest=$(
              gh api --paginate "repos/${repo}/releases?per_page=100" \
                --jq '.[].tag_name' 2>/dev/null |
                grep -E "$pattern" |
                sort -V |
                tail -1 || true
            )
            latest="${latest:-unknown}"
            if [ "$latest" != "unknown" ] && [ "$latest" != "$current" ]; then
              echo "  - **${name}**: ${current} → ${latest} ([releases](https://github.com/${repo}/releases))" >> updates.md
              echo "found=true" >> "$GITHUB_OUTPUT"
            fi
          }

          check_go_module() {
            local module=$1
            local current=$2
            local name=$3

            latest=$(go list -m -versions "${module}" 2>/dev/null | awk '{print $NF}' || echo "unknown")
            if [ "$latest" != "unknown" ] && [ "$latest" != "$current" ]; then
              echo "  - **${name}**: ${current} → ${latest}" >> updates.md
              echo "found=true" >> "$GITHUB_OUTPUT"
            fi
          }

          check_kind_node_image() {
            local current=$1
            local name=$2

            latest=$(
              curl -fsSL "https://registry.hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" |
                jq -r '.results[].name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))' |
                sort -V |
                tail -1
            )
            latest="${latest:-unknown}"
            if [ "$latest" != "unknown" ] && [ "$latest" != "$current" ]; then
              echo "  - **${name}**: ${current} → ${latest} ([tags](https://hub.docker.com/r/kindest/node/tags))" >> updates.md
              echo "found=true" >> "$GITHUB_OUTPUT"
            fi
          }

          check_envtest_kubernetes() {
            local current=$1
            local name=$2

            latest=$(
              go run "sigs.k8s.io/controller-runtime/tools/setup-envtest@${{ steps.versions.outputs.envtest }}" list --os linux --arch amd64 |
                awk '/available/ {print $2}' |
                sed 's/^v//' |
                sort -V |
                tail -1
            )
            latest="${latest:-unknown}"
            if [ "$latest" != "unknown" ] && [ "$latest" != "$current" ]; then
              echo "  - **${name}**: ${current} → ${latest}" >> updates.md
              echo "found=true" >> "$GITHUB_OUTPUT"
            fi
          }

          {
            echo "## Tool Update Report"
            echo ""
            echo "The following tools have newer versions available:"
            echo ""
          } > updates.md

          # Check GitHub releases
          check_github_release "kubernetes-sigs/kustomize" "${{ steps.versions.outputs.kustomize }}" "kustomize" "kustomize/"
          check_github_release "kubernetes-sigs/controller-tools" "${{ steps.versions.outputs.controller_tools }}" "controller-tools"
          check_go_module "sigs.k8s.io/controller-runtime/tools/setup-envtest" "${{ steps.versions.outputs.envtest }}" "setup-envtest"
          check_envtest_kubernetes "${{ steps.versions.outputs.envtest_k8s }}" "envtest Kubernetes assets"
          check_github_release "golangci/golangci-lint" "${{ steps.versions.outputs.golangci_lint }}" "golangci-lint"
          check_github_release "elastic/crd-ref-docs" "${{ steps.versions.outputs.crd_ref_docs }}" "crd-ref-docs"
          check_github_release "arttor/helmify" "${{ steps.versions.outputs.helmify }}" "helmify"
          check_github_release "uber-go/mock" "${{ steps.versions.outputs.mockgen }}" "mockgen"
          check_github_release "mikefarah/yq" "${{ steps.versions.outputs.yq }}" "yq"
          check_github_release "kubernetes-sigs/kind" "${{ steps.versions.outputs.kind }}" "kind"
          check_kind_node_image "${{ steps.versions.outputs.kind_k8s }}" "kind node Kubernetes"
          check_github_release "helm/helm" "${{ steps.versions.outputs.helm }}" "helm"
          check_github_release "cert-manager/cert-manager" "${{ steps.versions.outputs.helm_test_cert_manager }}" "Helm install test cert-manager"
          check_github_release "cert-manager/cert-manager" "${{ steps.versions.outputs.e2e_cert_manager }}" "e2e cert-manager CRDs"
          check_github_release "kubernetes-sigs/gateway-api" "${{ steps.versions.outputs.e2e_gateway_api }}" "e2e Gateway API CRDs"
          check_github_release "prometheus-operator/prometheus-operator" "${{ steps.versions.outputs.e2e_prometheus_operator }}" "e2e Prometheus Operator CRDs"
          check_github_release "projectcalico/calico" "${{ steps.versions.outputs.e2e_calico }}" "e2e Calico CRDs"
          check_github_release_matching "external-secrets/external-secrets" "${{ steps.versions.outputs.e2e_external_secrets }}" "e2e External Secrets CRDs" "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
          check_github_release "vmware-tanzu/velero" "${{ steps.versions.outputs.e2e_velero }}" "e2e Velero CRDs"
          check_github_release "cert-manager/cert-manager" "${{ steps.versions.outputs.e2e_utils_cert_manager }}" "e2e utility cert-manager install"
          check_github_release "prometheus-operator/prometheus-operator" "${{ steps.versions.outputs.e2e_utils_prometheus_operator }}" "e2e utility Prometheus Operator install"
          check_go_module "golang.org/x/vuln" "${{ steps.versions.outputs.govulncheck }}" "govulncheck"
          check_go_module "github.com/securego/gosec/v2" "${{ steps.versions.outputs.gosec }}" "gosec"

          {
            echo ""
            echo "---"
            echo "To update, edit \`versions.env\` and run \`make manifests generate\` to verify compatibility."
          } >> updates.md

          if [ -f updates.md ]; then
            cat updates.md
          fi

      - name: Upload update report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tool-update-report
          path: updates.md
          retention-days: 7

      - name: Summary
        run: |
          echo "### Tool Update Check Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f updates.md ]; then
            cat updates.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All tools are up to date!" >> "$GITHUB_STEP_SUMMARY"
          fi

  create-issue:
    name: Create Tool Update Issue
    needs: check-updates
    if: needs.check-updates.outputs.found == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download update report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tool-update-report

      - name: Create or update issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_TITLE="🔧 Tool Updates Available"

          # Check if issue already exists
          EXISTING_ISSUE=$(gh issue list --label "dependencies" --label "automation" --state open --search "$ISSUE_TITLE" --json number --jq '.[0].number' || echo "")

          if [ -n "$EXISTING_ISSUE" ]; then
            # Update existing issue
            gh issue comment "$EXISTING_ISSUE" --body-file updates.md
            echo "Updated issue #${EXISTING_ISSUE}"
          else
            # Create new issue
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file updates.md \
              --label "dependencies" \
              --label "automation"
            echo "Created new issue"
          fi
