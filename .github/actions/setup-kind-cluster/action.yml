# NOTE: This action is designed for standalone cluster setup in custom workflows.
# The E2E tests in this repository use 'make test-e2e-*' targets with E2E_RECREATE_CLUSTER=true,
# which handle cluster creation internally for better integration with test lifecycle.
# Use this action when you need explicit control over cluster creation/deletion.

name: 'Setup Kind Cluster'
description: 'Create a kind cluster and optionally install popular CRDs'

inputs:
  cluster-name:
    description: 'Name of the kind cluster'
    required: false
    default: 'auth-operator-e2e'
  k8s-version:
    description: 'Kubernetes version for the cluster'
    required: false
    default: 'v1.36.1'
  wait-timeout:
    description: 'Timeout for cluster to be ready'
    required: false
    default: '5m'
  install-crds:
    description: 'Install popular CRDs (Prometheus, cert-manager, etc.)'
    required: false
    default: 'false'
  crd-setup-script:
    description: 'Path to the CRD setup script'
    required: false
    default: 'hack/ci/setup-kind-crds.sh'
  multi-node:
    description: 'Create a multi-node cluster for HA testing'
    required: false
    default: 'false'

outputs:
  cluster-name:
    description: 'Name of the created cluster'
    value: ${{ inputs.cluster-name }}

runs:
  using: 'composite'
  steps:
    - name: Create kind cluster (single node)
      if: inputs.multi-node != 'true'
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        K8S_VERSION: ${{ inputs.k8s-version }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
      run: |
        set -euo pipefail
        [[ "$CLUSTER_NAME" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "invalid cluster name"; exit 1; }
        [[ "$K8S_VERSION" =~ ^v[0-9]+[A-Za-z0-9._-]*$ ]] || { echo "invalid Kubernetes version"; exit 1; }
        [[ "$WAIT_TIMEOUT" =~ ^[0-9]+[smh]$ ]] || { echo "invalid wait timeout"; exit 1; }
        kind create cluster \
          --name "$CLUSTER_NAME" \
          --image "kindest/node:${K8S_VERSION}" \
          --wait "$WAIT_TIMEOUT"
        kubectl cluster-info

    - name: Create kind cluster (multi-node for HA)
      if: inputs.multi-node == 'true'
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        K8S_VERSION: ${{ inputs.k8s-version }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
      run: |
        set -euo pipefail
        [[ "$CLUSTER_NAME" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "invalid cluster name"; exit 1; }
        [[ "$K8S_VERSION" =~ ^v[0-9]+[A-Za-z0-9._-]*$ ]] || { echo "invalid Kubernetes version"; exit 1; }
        [[ "$WAIT_TIMEOUT" =~ ^[0-9]+[smh]$ ]] || { echo "invalid wait timeout"; exit 1; }
        cat <<EOF | kind create cluster --name "$CLUSTER_NAME" --wait "$WAIT_TIMEOUT" --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          image: kindest/node:${K8S_VERSION}
        - role: worker
          image: kindest/node:${K8S_VERSION}
        - role: worker
          image: kindest/node:${K8S_VERSION}
        EOF
        kubectl cluster-info

    - name: Install popular CRDs
      if: inputs.install-crds == 'true'
      shell: bash
      env:
        KIND_CLUSTER_NAME: ${{ inputs.cluster-name }}
        CRD_SETUP_SCRIPT: ${{ inputs.crd-setup-script }}
      run: |
        set -euo pipefail
        [[ "$KIND_CLUSTER_NAME" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "invalid cluster name"; exit 1; }
        [[ "$CRD_SETUP_SCRIPT" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "invalid CRD setup script path"; exit 1; }
        chmod +x "$CRD_SETUP_SCRIPT"
        bash "$CRD_SETUP_SCRIPT"
