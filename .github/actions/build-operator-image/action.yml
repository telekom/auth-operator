name: 'Build Operator Image'
description: 'Build the auth-operator Docker image with caching'

inputs:
  image-name:
    description: 'Name of the image to build'
    required: false
    default: 'auth-operator'
  image-tag:
    description: 'Tag for the image'
    required: false
    default: 'latest'
  push-to-registry:
    description: 'Push image to container registry'
    required: false
    default: 'false'
  registry:
    description: 'Container registry to push to (e.g., ghcr.io)'
    required: false
    default: 'ghcr.io'
  registry-username:
    description: 'Username for registry authentication'
    required: false
    default: ''
  registry-password:
    description: 'Password/token for registry authentication'
    required: false
    default: ''
  load-to-kind:
    description: 'Load image into kind cluster'
    required: false
    default: 'false'
  kind-cluster-name:
    description: 'Name of the kind cluster to load image into'
    required: false
    default: 'auth-operator-e2e'
  working-directory:
    description: 'Working directory containing the Dockerfile'
    required: false
    default: '.'

outputs:
  image:
    description: 'Full image reference (name:tag)'
    value: ${{ steps.build.outputs.image }}

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to Container Registry
      if: inputs.push-to-registry == 'true'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Build Docker image
      id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        PUSH_TO_REGISTRY: ${{ inputs.push-to-registry }}
        LOAD_TO_KIND: ${{ inputs.load-to-kind }}
      run: |
        set -euo pipefail
        [[ "$IMAGE_NAME" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "invalid image name"; exit 1; }
        [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "invalid image tag"; exit 1; }
        [[ "$PUSH_TO_REGISTRY" =~ ^(true|false)$ ]] || { echo "invalid push-to-registry value"; exit 1; }
        [[ "$LOAD_TO_KIND" =~ ^(true|false)$ ]] || { echo "invalid load-to-kind value"; exit 1; }
        IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"
        echo "Building image: $IMAGE"

        # Extract Go version from go.mod (single source of truth)
        GO_VERSION=$(grep -E '^toolchain go' go.mod | sed 's/toolchain go//' || true)
        if [ -z "$GO_VERSION" ]; then
          GO_VERSION=$(grep -E '^go [0-9]' go.mod | awk '{print $2}')
        fi
        echo "Using Go version from go.mod: $GO_VERSION"

        # Validate: cannot push to registry when loading to kind
        if [ "$PUSH_TO_REGISTRY" = "true" ] && [ "$LOAD_TO_KIND" = "true" ]; then
          echo "ERROR: Cannot use push-to-registry and load-to-kind simultaneously"
          echo "load-to-kind requires the image to be available locally (--load), but push-to-registry uses --push"
          exit 1
        fi

        # Determine build flags based on push/load requirements
        BUILD_FLAGS=(--load)
        if [ "$PUSH_TO_REGISTRY" = "true" ]; then
          BUILD_FLAGS=(--push)
        fi

        # Build with cache using buildx
        docker buildx build \
          --build-arg GO_VERSION="${GO_VERSION}" \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          "${BUILD_FLAGS[@]}" \
          -t "$IMAGE" \
          .

        echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

    - name: Load image into kind
      if: inputs.load-to-kind == 'true'
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        KIND_CLUSTER_NAME: ${{ inputs.kind-cluster-name }}
      run: |
        set -euo pipefail
        [[ "$IMAGE_NAME" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "invalid image name"; exit 1; }
        [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "invalid image tag"; exit 1; }
        [[ "$KIND_CLUSTER_NAME" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "invalid kind cluster name"; exit 1; }
        kind load docker-image "${IMAGE_NAME}:${IMAGE_TAG}" --name "$KIND_CLUSTER_NAME"
