name: 'Setup Go Environment'
description: 'Setup Go with caching and optional tools installation'

inputs:
  go-version-file:
    description: 'Path to go.mod file for Go version (single source of truth)'
    required: false
    default: 'go.mod'
  install-kind:
    description: 'Install kind CLI'
    required: false
    default: 'false'
  kind-version:
    description: 'Kind version to install'
    required: false
    default: 'v0.32.0'
  install-helm:
    description: 'Install Helm CLI'
    required: false
    default: 'false'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'v4.2.2'
  install-golangci-lint:
    description: 'Install golangci-lint'
    required: false
    default: 'false'
  golangci-lint-version:
    description: 'golangci-lint version to install'
    required: false
    default: 'v2.12.2'
  cache-dependency-path:
    description: 'Path to go.sum for cache key'
    required: false
    default: 'go.sum'

runs:
  using: 'composite'
  steps:
    - name: Extract Go version from toolchain or go directive
      id: go-version
      shell: bash
      env:
        GO_VERSION_FILE: ${{ inputs.go-version-file }}
      run: |
        set -euo pipefail
        [[ "$GO_VERSION_FILE" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "invalid go-version-file"; exit 1; }
        GO_MOD="$GO_VERSION_FILE"
        # Prefer toolchain directive, fall back to go directive
        VERSION=$(grep -E '^toolchain go' "$GO_MOD" | sed 's/toolchain go//' || true)
        if [ -z "$VERSION" ]; then
          VERSION=$(grep -E '^go [0-9]' "$GO_MOD" | awk '{print $2}')
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Using Go version: $VERSION"

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: true
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install kind
      if: inputs.install-kind == 'true'
      shell: bash
      env:
        KIND_VERSION: ${{ inputs.kind-version }}
      run: |
        set -euo pipefail
        [[ "$KIND_VERSION" =~ ^v[0-9]+[A-Za-z0-9._-]*$ ]] || { echo "invalid kind version"; exit 1; }
        go install "sigs.k8s.io/kind@${KIND_VERSION}"

    - name: Install Helm
      if: inputs.install-helm == 'true'
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: ${{ inputs.helm-version }}

    - name: Install golangci-lint
      if: inputs.install-golangci-lint == 'true'
      shell: bash
      env:
        GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
      run: |
        set -euo pipefail
        [[ "$GOLANGCI_LINT_VERSION" =~ ^v[0-9]+[A-Za-z0-9._-]*$ ]] || { echo "invalid golangci-lint version"; exit 1; }
        go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
