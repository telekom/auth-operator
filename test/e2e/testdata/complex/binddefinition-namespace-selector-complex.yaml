# Complex BindDefinition: Tests advanced namespace selector with matchExpressions
apiVersion: authorization.t-caas.telekom.com/v1alpha1
kind: BindDefinition
metadata:
  name: complex-ns-selector
spec:
  targetName: complex-ns-select
  subjects:
    - apiGroup: rbac.authorization.k8s.io
      kind: Group
      name: tenant-admins
  roleBindings:
    # Complex selector with matchExpressions
    - clusterRoleRefs:
        - admin
      namespaceSelector:
        - matchLabels:
            t-caas.telekom.com/owner: tenant
          matchExpressions:
            - key: t-caas.telekom.com/tenant
              operator: In
              values:
                - complex-beta
            - key: t-caas.telekom.com/tenant
              operator: NotIn
              values:
                - restricted
                - legacy
        # Second selector - OR with first
        - matchLabels:
            kubernetes.io/metadata.name: complex-e2e-ns-team-b
